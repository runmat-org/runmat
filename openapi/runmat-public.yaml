      type: object
      required:
      - email
      properties:
        email:
          type: string
    AuthResendVerificationResponse:
      type: object
      required:
      - accepted
      properties:
        accepted:
          type: boolean
    AuthResolveRequest:
      type: object
      properties:
        client_kind:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
    AuthResolveResponse:
      type: object
      required:
      - mode
      - redirect_url
      properties:
        audience:
          type: string
          nullable: true
        client_id:
          type: string
          nullable: true
        mode:
          type: string
        org_id:
          type: string
          nullable: true
        redirect_url:
          type: string
        scope:
          type: string
          nullable: true
    DataChunkDescriptor:
      type: object
      required:
      - key
      - object_id
      - hash
      - bytes_raw
      - bytes_stored
      properties:
        bytes_raw:
          type: integer
          format: int64
          minimum: 0
        bytes_stored:
          type: integer
          format: int64
          minimum: 0
        hash:
          type: string
        key:
          type: string
        object_id:
          type: string
    DataChunkUploadTargetResponse:
      type: object
      required:
      - key
      - method
      - upload_url
      - headers
      properties:
        headers:
          type: object
          additionalProperties:
            type: string
        key:
          type: string
        method:
          type: string
        upload_url:
          type: string
    DataChunkUploadTargetsRequest:
      type: object
      required:
      - dataset_path
      - array
      - chunks
      properties:
        array:
          type: string
        chunks:
          type: array
          items:
            $ref: '#/components/schemas/DataChunkDescriptor'
        dataset_path:
          type: string
    DataChunkUploadTargetsResponse:
      type: object
      required:
      - targets
      properties:
        targets:
          type: array
          items:
            $ref: '#/components/schemas/DataChunkUploadTargetResponse'
