components:
  schemas:
    AuthMeResponse:
      type: object
      required:
      - user
      - orgs
      properties:
        orgs:
          type: array
          items:
            $ref: '#/components/schemas/server_org.Org'
        user:
          $ref: '#/components/schemas/server_identity.UserProfile'
