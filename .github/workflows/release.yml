name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test
        required: true
        default: main

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  VERSION: ${{ github.ref_name }}

jobs:
  build-and-test:
    runs-on: ["self-hosted", "windows", "GCP"]
    env:
      # Enable backtraces on CI to aid debugging of panics/segfaults
      RUST_BACKTRACE: 1
      MATRIX_NAME: windows-x86_64
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Validate Rust toolchain (Windows self-hosted)
        shell: pwsh
        env:
          RUST_TOOLCHAIN: 1.90.0-x86_64-pc-windows-msvc
          RUST_COMPONENTS: rustfmt clippy
        run: |
          $ErrorActionPreference = 'Stop'

          $toolchain = $env:RUST_TOOLCHAIN
          $components = $env:RUST_COMPONENTS.Split(' ')
          $userProfile = [Environment]::GetFolderPath('UserProfile')
          $cargoHome = Join-Path $userProfile '.cargo'
          $rustupHome = Join-Path $userProfile '.rustup'
          $cargoBin = Join-Path $cargoHome 'bin'
          $rustup = Join-Path $cargoBin 'rustup.exe'
          $cargo = Join-Path $cargoBin 'cargo.exe'

          if (-not (Test-Path $rustup)) {
            throw "Missing rustup at $rustup. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          if (-not (Test-Path $cargo)) {
            throw "Missing cargo at $cargo. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          $unexpectedCargoHome = [Environment]::GetEnvironmentVariable('CARGO_HOME', 'Machine')
          if ($unexpectedCargoHome -and $unexpectedCargoHome -ne $cargoHome) {
            throw "Machine CARGO_HOME is '$unexpectedCargoHome', but the runner account Rust install must live at $cargoHome."
          }
          $unexpectedRustupHome = [Environment]::GetEnvironmentVariable('RUSTUP_HOME', 'Machine')
          if ($unexpectedRustupHome -and $unexpectedRustupHome -ne $rustupHome) {
            throw "Machine RUSTUP_HOME is '$unexpectedRustupHome', but the runner account Rust install must live at $rustupHome."
          }

          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_HOME=$cargoHome"
          Add-Content -Path $env:GITHUB_ENV -Value "RUSTUP_HOME=$rustupHome"
          Add-Content -Path $env:GITHUB_ENV -Value "RUSTUP_TOOLCHAIN=$toolchain"
          Add-Content -Path $env:GITHUB_PATH -Value $cargoBin

          & $rustup which --toolchain $toolchain cargo | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "rustup which failed (exit $LASTEXITCODE) — toolchain $toolchain may not be installed." }
          $installedComponents = & $rustup component list --toolchain $toolchain --installed
          if ($LASTEXITCODE -ne 0) { throw "rustup component list failed (exit $LASTEXITCODE)." }
          foreach ($component in $components) {
            $componentPattern = '^{0}-' -f [regex]::Escape($component)
            if (-not ($installedComponents | Select-String -Pattern $componentPattern -Quiet)) {
              throw "Missing Rust component '$component' for toolchain $toolchain. Provision the runner with scripts/bootstrap-windows-runner.ps1."
            }
          }
          & $cargo -V
          if ($LASTEXITCODE -ne 0) { throw "cargo -V failed (exit $LASTEXITCODE) — toolchain may be broken." }
          & (Join-Path $cargoBin 'rustc.exe') -V
          if ($LASTEXITCODE -ne 0) { throw "rustc -V failed (exit $LASTEXITCODE) — toolchain may be broken." }


      - name: Validate Windows runner dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $triplet = 'x64-windows'
          $vcpkgRoot = if ($env:VCPKG_ROOT) { $env:VCPKG_ROOT } else { 'C:\vcpkg' }
          $prefix = Join-Path $vcpkgRoot "installed\$triplet"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          $vsInstall = & $vswhere `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio C++ Build Tools were not detected. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          if (-not (Get-Command pkg-config -ErrorAction SilentlyContinue)) {
            throw "pkg-config was not found on PATH. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            throw "Perl was not found on PATH. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }

          $required = @(
            (Join-Path $vcpkgRoot 'vcpkg.exe'),
            (Join-Path $prefix 'include\zmq.h'),
            (Join-Path $prefix 'lib\openblas.lib'),
            (Join-Path $prefix 'lib\lapack.lib'),
            (Join-Path $prefix 'lib\pkgconfig\libzmq.pc')
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required Windows dependency artifact: $path. Provision the runner with scripts/bootstrap-windows-runner.ps1."
            }
          }
          $zmqImportLibs = Get-ChildItem -Path (Join-Path $prefix 'lib') -Filter '*zmq*.lib' -ErrorAction SilentlyContinue
          if (-not $zmqImportLibs) {
            throw "Missing required ZeroMQ import library under $prefix\lib. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }

          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_TRIPLET=$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_DYNAMIC=1"
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$prefix\include;$env:INCLUDE"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$prefix\lib;$env:LIB"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_PATH=$prefix"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_INCLUDE_DIR=$prefix\include"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_LIB_DIR=$prefix\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$prefix\lib\pkgconfig"
          Add-Content -Path $env:GITHUB_PATH -Value $vcpkgRoot
          Add-Content -Path $env:GITHUB_PATH -Value "$prefix\bin"
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIB_DIR=$prefix\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIBS=openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIB_DIR=$prefix\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIBS=lapack;openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENBLAS_DIR=$prefix"

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy (Windows)
        shell: pwsh
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (Windows)
        shell: pwsh
        env:
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          $ErrorActionPreference = 'Stop'
          cargo test --all-targets --all-features 2>&1 | Tee-Object -FilePath test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test Summary
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('test.log', 'utf8');
            const matrixName = process.env.MATRIX_NAME || 'matrix';
            let totalPassed = 0;
            let totalFailed = 0;
            let current = '';
            const details = [];
            for (const line of log.split('\n')) {
              const run = line.match(/Running .*deps\/(.+?)-[a-f0-9]+\)/);
              if (run) current = run[1];
              const m = line.match(/test result: .*?(\d+) passed; (\d+) failed.*finished in ([0-9.]+)s/);
              if (m) {
                const passed = parseInt(m[1], 10);
                const failed = parseInt(m[2], 10);
                totalPassed += passed;
                totalFailed += failed;
                details.push(`- ${matrixName} / ${current || 'crate'}: ${passed} passed, ${failed} failed (${m[3]}s)`);
                current = '';
              }
            }
            let body = '**Test Summary**\n';
            body += details.join('\n');
            body += `\n**Totals**: ${totalPassed} passed, ${totalFailed} failed`;
            console.log(body);
  
  build-release:
    if: github.event_name == 'push'
    environment: Production
    name: Build ${{ matrix.platform.release_for }}
    env:
      RUNMAT_TELEMETRY_KEY: ${{ secrets.TELEMETRY_INGESTION_KEY }}
    strategy:
      max-parallel: 8
      matrix:
        platform:
          
          - release_for: windows-x86_64
            os: windows-latest-l
            target: x86_64-pc-windows-msvc
            bin: runmat.exe
            name: runmat-windows-x86_64.zip
            command: build

          - release_for: macos-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            bin: runmat
            name: runmat-darwin-x86_64.tar.gz
            command: build

          - release_for: macos-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            bin: runmat
            name: runmat-darwin-aarch64.tar.gz
            command: build

          - release_for: linux-x86_64
            os: ubuntu-latest-gpu
            target: x86_64-unknown-linux-gnu
            bin: runmat
            name: runmat-linux-x86_64.tar.gz
            command: build

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Install BLAS/LAPACK dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev libzmq3-dev pkg-config libssl-dev

      - name: Install macOS dependencies (ZMQ)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install zeromq

      - name: Install Windows MSVC dependencies (ZMQ, vcpkg + OpenBLAS/LAPACK)
        if: runner.os == 'Windows' && matrix.platform.target != 'aarch64-pc-windows-gnu'
        shell: pwsh
        run: |
          choco install -y pkgconfiglite

          Write-Host "Fetching prebuilt ZeroMQ for Windows (MSVC)"
          curl -L -o libzmq.zip https://github.com/zeromq/libzmq/releases/download/v4.3.5/zeromq-4.3.5.zip
          Expand-Archive -Path libzmq.zip -DestinationPath zmq
          # Set env vars for ZMQ include/lib
          $zmq = Join-Path $pwd "zmq"
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$($zmq)\include;$env:INCLUDE"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$($zmq)\lib;$env:LIB"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_PATH=$($zmq)"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$($zmq)\lib\pkgconfig"

          Write-Host "Cloning vcpkg and installing OpenBLAS/LAPACK"
          $vcpkgRoot = Join-Path $pwd "vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat"

          # Compute vcpkg triplet based on target
          $target = "${{ matrix.platform.target }}"
          if ($target -eq "aarch64-pc-windows-msvc") {
            $triplet = "arm64-windows"
          } else {
            $triplet = "x64-windows"
          }

          # Ensure triplet in env
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_TRIPLET=$triplet"

          # Install OpenBLAS and LAPACK provider; on arm64-windows allow unsupported gfortran
          & "$vcpkgRoot\vcpkg.exe" install "openblas:$triplet"
          if ($triplet -eq "arm64-windows") {
            & "$vcpkgRoot\vcpkg.exe" install "lapack-reference:$triplet" --allow-unsupported
          } else {
            & "$vcpkgRoot\vcpkg.exe" install "lapack-reference:$triplet"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_DYNAMIC=1"
          Add-Content -Path $env:GITHUB_PATH -Value "$vcpkgRoot\installed\$triplet\bin"

          # Hint BLAS/LAPACK discovery for blas-sys/lapack-sys
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIB_DIR=$vcpkgRoot\installed\$triplet\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIBS=openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIB_DIR=$vcpkgRoot\installed\$triplet\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIBS=lapack;openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENBLAS_DIR=$vcpkgRoot\installed\$triplet"

      - name: Cross build (linux-x86_64)
        if: matrix.platform.target == 'x86_64-unknown-linux-gnu'
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: ${{ matrix.platform.command }}
          target: ${{ matrix.platform.target }}
          # Use system OpenSSL via pkg-config; libssl-dev installed above
          args: "--locked --release --bin runmat --features blas-lapack"
          strip: true

      - name: Cross build (other targets)
        if: matrix.platform.target != 'x86_64-unknown-linux-gnu'
        uses: houseabsolute/actions-rust-cross@v0
        env:
          OPENSSL_NO_PKG_CONFIG: '1'
          OPENSSL_STATIC: '1'
        with:
          command: ${{ matrix.platform.command }}
          target: ${{ matrix.platform.target }}
          # Build all targets with vendored OpenSSL and full BLAS+LAPACK
          args: "--locked --release --bin runmat --features blas-lapack,vendored-openssl"
          strip: true

      - name: Import signing cert and codesign (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_CERT_IDENTITY: ${{ secrets.MACOS_CERT_IDENTITY }}
        run: |
          set -euxo pipefail
          # Prepare keychain with Developer ID Application certificate
          KEYCHAIN=build.keychain
          KEYCHAIN_PWD=$(uuidgen)
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"

          BIN="target/${{ matrix.platform.target }}/release/runmat"
          # Minimal entitlements to support JIT and dynamic loading under Hardened Runtime
          cat > entitlements.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key><true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>
            <key>com.apple.security.cs.disable-library-validation</key><true/>
          </dict>
          </plist>
          EOF

          codesign --force --timestamp --options runtime --entitlements entitlements.plist \
            --sign "$MACOS_CERT_IDENTITY" "$BIN"
          codesign -dv --verbose=4 "$BIN" || true

      - name: Notarize (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_NOTARIZE_KEY_ID: ${{ secrets.APPLE_NOTARIZE_KEY_ID }}
          APPLE_NOTARIZE_ISSUER_ID: ${{ secrets.APPLE_NOTARIZE_ISSUER_ID }}
          APPLE_NOTARIZE_PRIVATE_KEY: ${{ secrets.APPLE_NOTARIZE_PRIVATE_KEY }}
        run: |
          set -euxo pipefail
          BIN="target/${{ matrix.platform.target }}/release/runmat"
          # Create a temporary zip only for notarization submission (do not ship this)
          ZIP_NAME="notarize-submit.zip"
          /usr/bin/zip -j "$ZIP_NAME" "$BIN"
          echo "$APPLE_NOTARIZE_PRIVATE_KEY" | base64 --decode > notary_key.p8
          # Submit and wait for notarization result
          xcrun notarytool submit "$ZIP_NAME" --key notary_key.p8 \
            --key-id "$APPLE_NOTARIZE_KEY_ID" --issuer "$APPLE_NOTARIZE_ISSUER_ID" --wait
          # Staple ticket to binary if possible (no-op for some formats)
          xcrun stapler staple "$BIN" || true
          rm -f "$ZIP_NAME" notary_key.p8

      - name: Package as archive (Windows)
        if: runner.os == 'Windows' && matrix.platform.target != 'aarch64-pc-windows-gnu'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = "${{ matrix.platform.target }}"
          $outDir = Join-Path "target" (Join-Path $target "release")
          $artifactName = "runmat-${{ env.VERSION }}-${{ matrix.platform.release_for }}"

          Push-Location $outDir
          # Copy required runtime DLLs into output dir
          $triplet = $env:VCPKG_DEFAULT_TRIPLET
          $vcpkgBin = Join-Path $env:VCPKG_ROOT ("installed\" + $triplet + "\bin")
          if (Test-Path $vcpkgBin) { Copy-Item -Path (Join-Path $vcpkgBin "*.dll") -Destination . -Force -ErrorAction SilentlyContinue }

          $zmqBin = Join-Path $env:ZMQ_PATH "bin"
          if (Test-Path $zmqBin) { Copy-Item -Path (Join-Path $zmqBin "*.dll") -Destination . -Force -ErrorAction SilentlyContinue }
          else {
            $zmqLib = Join-Path $env:ZMQ_PATH "lib"
            if (Test-Path $zmqLib) { Copy-Item -Path (Join-Path $zmqLib "*.dll") -Destination . -Force -ErrorAction SilentlyContinue }
          }

          # Create zip with binary and DLLs
          7z a (Join-Path "..\..\.." ("$artifactName.zip")) ${{ matrix.platform.bin }} *.dll
          Pop-Location

      - name: Package as archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          ARTIFACT_NAME="runmat-${{ env.VERSION }}-${{ matrix.platform.release_for }}"
          tar czvf ../../../${ARTIFACT_NAME}.tar.gz ${{ matrix.platform.bin }}
          cd -

      - name: Publish release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runmat-${{ env.VERSION }}-${{ matrix.platform.release_for }}
          path: |
            runmat-*.tar.gz
            runmat-*.zip

  create-release:
    if: github.event_name == 'push'
    name: Create Release
    needs: [build-and-test, build-release]
    environment: Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: RunMat ${{ github.ref_name }}
          body: |
            ## RunMat ${{ github.ref_name }}
            
            High-performance MATLAB/Octave runtime with Jupyter kernel support.
            
            ### Installation
            
            #### Quick Install (Recommended)
            ```bash
            # Linux/macOS
            curl -fsSL https://runmat.com/install.sh | sh
            
            # Windows (PowerShell)
            iwr https://runmat.com/install.ps1 | iex
            ```
            
            #### Manual Installation
            1. Download the appropriate binary for your platform below
            2. Extract the archive
            3. Add the binary to your PATH
            
            ### Documentation
            - [Getting Started](https://runmat.com/docs/getting-started)
          files: |
            artifacts/**/*
          draft: false
          prerelease: false

  publish-crates:
    if: github.event_name == 'push'
    name: Publish crates to crates.io
    needs: [create-release]
    environment: Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Ensure LICENSE is included in each crate
        shell: bash
        run: |
          set -euxo pipefail
          for d in crates/*; do
            if [ -d "$d" ]; then
              if [ -f LICENSE ] || [ -f LICENSE.md ]; then
                cp -f LICENSE* "$d/" || true
                if [ -f "$d/LICENSE.md" ]; then mv -f "$d/LICENSE.md" "$d/LICENSE"; fi
              fi
            fi
          done

      - name: Normalize Cargo.toml license metadata
        shell: bash
        run: |
          set -euxo pipefail
          for toml in crates/*/Cargo.toml; do
            if grep -Eq '^license-file[[:space:]]*=[[:space:]]*"\..*/LICENSE' "$toml"; then
              sed -E -i.bak 's#^license-file[[:space:]]*=[[:space:]]*"\..*/LICENSE.*#license-file = "LICENSE"#' "$toml"
              rm -f "$toml.bak"
            fi
            if ! grep -Eq '^license[[:space:]]*=' "$toml" && [ -f "${toml%/*}/LICENSE" ]; then
              awk 'BEGIN{printed=0} {print} /^\[package\]/{if(!printed){print "license = \"MIT\""; printed=1}}' "$toml" > "$toml.tmp" && mv "$toml.tmp" "$toml"
            fi
          done

      - name: Publish crates with cargo-workspaces
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euxo pipefail
          cargo install cargo-workspaces --locked
          cargo workspaces publish \
            --all \
            --yes \
            --allow-dirty \
            --skip-published \
            --publish-as-is \
            --publish-interval 30 \
            --no-verify \
            --token "$CARGO_REGISTRY_TOKEN"

  publish-bindings:
    if: github.event_name == 'push'
    name: Test & publish wasm bindings to npm
    needs: [create-release]
    environment: Production
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: bindings/ts/package-lock.json

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.90.0
          profile: minimal

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install system dependencies for headless Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev build-essential \
            libgtk-3-0 libnss3 libx11-xcb1 libxcomposite1 \
            libxi6 libxdamage1 libxrandr2 libgdk-pixbuf2.0-0 libdrm2 libgbm1 \
            libpango-1.0-0 libcairo2 libatspi2.0-0 libxss1 libxfixes3 \
            libxkbcommon0 libwayland-client0 libwayland-cursor0 libwayland-egl1 \
            libxshmfence1 fonts-liberation libu2f-udev
          sudo apt-get install -y libasound2 || sudo apt-get install -y libasound2t64

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install npm dependencies
        working-directory: bindings/ts
        run: npm ci

      - name: Build wasm32 target
        run: RUNMAT_GENERATE_WASM_REGISTRY=1 cargo build -p runmat-wasm --target wasm32-unknown-unknown

      - name: Run wasm headless tests
        env:
          RUNMAT_CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          WASM_BINDGEN_TEST_TIMEOUT: "300"
        run: scripts/test-wasm-headless.sh

      - name: Build bindings package
        working-directory: bindings/ts
        run: npm run build

      - name: Lint bindings package
        working-directory: bindings/ts
        run: npm run lint

      - name: Publish bindings package to npm
        working-directory: bindings/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
