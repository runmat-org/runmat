name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Run on pushes for all branches, and only on PRs from forks to avoid double CI on same-repo PRs
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - runner: ["self-hosted", "linux", "GCP"]
            name: linux-x86_64
          - runner: ["self-hosted", "windows", "GCP"]
            name: windows-x86_64
          - runner: macos-latest
            name: macos-universal
    runs-on: ${{ matrix.runner }}
    env:
      # Enable backtraces on CI to aid debugging of panics/segfaults
      RUST_BACKTRACE: 1
      MATRIX_NAME: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v3

      - name: Validate Rust toolchain (Linux self-hosted)
        if: runner.os == 'Linux'
        shell: bash
        env:
          RUST_TOOLCHAIN: 1.90.0-x86_64-unknown-linux-gnu
          RUST_COMPONENTS: rustfmt clippy
        run: |
          set -euo pipefail

          toolchain="${RUST_TOOLCHAIN}"
          cargo_home="${CARGO_HOME:-${HOME}/.cargo}"
          rustup_home="${RUSTUP_HOME:-${HOME}/.rustup}"
          cargo_bin="${cargo_home}/bin"
          rustup="${cargo_bin}/rustup"
          cargo="${cargo_bin}/cargo"

          if [[ ! -x "${rustup}" ]]; then
            echo "Missing rustup at ${rustup}. Provision the runner with scripts/bootstrap-linux-runner.sh." >&2
            exit 1
          fi
          if [[ ! -x "${cargo}" ]]; then
            echo "Missing cargo at ${cargo}. Provision the runner with scripts/bootstrap-linux-runner.sh." >&2
            exit 1
          fi

          {
            echo "CARGO_HOME=${cargo_home}"
            echo "RUSTUP_HOME=${rustup_home}"
            echo "RUSTUP_TOOLCHAIN=${toolchain}"
          } >> "${GITHUB_ENV}"
          echo "${cargo_bin}" >> "${GITHUB_PATH}"

          "${rustup}" which --toolchain "${toolchain}" cargo >/dev/null
          installed_components="$("${rustup}" component list --toolchain "${toolchain}" --installed)"
          for component in ${RUST_COMPONENTS}; do
            if ! grep -q "^${component}-" <<<"${installed_components}"; then
              echo "Missing Rust component '${component}' for toolchain ${toolchain}. Provision the runner with scripts/bootstrap-linux-runner.sh." >&2
              exit 1
            fi
          done
          "${cargo}" -V
          "${cargo_bin}/rustc" -V

      - name: Validate Rust toolchain (Windows self-hosted)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RUST_TOOLCHAIN: 1.90.0-x86_64-pc-windows-msvc
          RUST_COMPONENTS: rustfmt clippy
        run: |
          $ErrorActionPreference = 'Stop'

          $toolchain = $env:RUST_TOOLCHAIN
          $components = $env:RUST_COMPONENTS.Split(' ')
          $cargoHome = if ($env:CARGO_HOME) { $env:CARGO_HOME } else { 'C:\Rust\.cargo' }
          $rustupHome = if ($env:RUSTUP_HOME) { $env:RUSTUP_HOME } else { 'C:\Rust\.rustup' }
          $cargoBin = Join-Path $cargoHome 'bin'
          $rustup = Join-Path $cargoBin 'rustup.exe'
          $cargo = Join-Path $cargoBin 'cargo.exe'

          if (-not (Test-Path $rustup)) {
            throw "Missing rustup at $rustup. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          if (-not (Test-Path $cargo)) {
            throw "Missing cargo at $cargo. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }

          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_HOME=$cargoHome"
          Add-Content -Path $env:GITHUB_ENV -Value "RUSTUP_HOME=$rustupHome"
          Add-Content -Path $env:GITHUB_ENV -Value "RUSTUP_TOOLCHAIN=$toolchain"
          Add-Content -Path $env:GITHUB_PATH -Value $cargoBin

          & $rustup which --toolchain $toolchain cargo | Out-Null
          $installedComponents = & $rustup component list --toolchain $toolchain --installed
          foreach ($component in $components) {
            $componentPattern = '^{0}-' -f [regex]::Escape($component)
            if (-not ($installedComponents | Select-String -Pattern $componentPattern -Quiet)) {
              throw "Missing Rust component '$component' for toolchain $toolchain. Provision the runner with scripts/bootstrap-windows-runner.ps1."
            }
          }
          & $cargo -V
          & (Join-Path $cargoBin 'rustc.exe') -V

      - uses: actions-rs/toolchain@v1
        if: runner.os == 'macOS'
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Validate Linux runner dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          packages=(
            build-essential
            ca-certificates
            curl
            gdb
            git
            libdbus-1-dev
            libegl1-mesa-dev
            libgl1-mesa-dev
            liblapack-dev
            libopenblas-dev
            libssl-dev
            libudev-dev
            libwayland-dev
            libx11-dev
            libxcursor-dev
            libxi-dev
            libxinerama-dev
            libxkbcommon-dev
            libxkbcommon-x11-0
            libxrandr-dev
            libzmq3-dev
            pkg-config
          )

          missing=()
          ldconfig_bin="$(command -v ldconfig || true)"
          if [[ -z "${ldconfig_bin}" && -x /usr/sbin/ldconfig ]]; then
            ldconfig_bin=/usr/sbin/ldconfig
          fi
          for pkg in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}\n' "${pkg}" 2>/dev/null | grep -qx 'install ok installed'; then
              missing+=("${pkg}")
            fi
          done

          if ! command -v pkg-config >/dev/null 2>&1; then
            missing+=('pkg-config(binary)')
          fi
          if ! command -v gdb >/dev/null 2>&1; then
            missing+=('gdb(binary)')
          fi
          if ! pkg-config --exists libzmq; then
            missing+=('libzmq(pkg-config)')
          fi
          if [[ -z "${ldconfig_bin}" ]]; then
            missing+=('ldconfig(binary)')
          elif ! "${ldconfig_bin}" -p | grep -q 'libopenblas\.so'; then
            missing+=('libopenblas(runtime)')
          fi
          if [[ -n "${ldconfig_bin}" ]] && ! "${ldconfig_bin}" -p | grep -q 'liblapack\.so'; then
            missing+=('liblapack(runtime)')
          fi

          if ((${#missing[@]} > 0)); then
            printf 'Missing Linux runner prerequisites:\n' >&2
            printf '  %s\n' "${missing[@]}" >&2
            echo "Provision the runner with scripts/bootstrap-linux-runner.sh." >&2
            exit 1
          fi

      - name: Install macOS dependencies (ZMQ)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install zeromq

      - name: Validate Windows runner dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $triplet = 'x64-windows'
          $vcpkgRoot = if ($env:VCPKG_ROOT) { $env:VCPKG_ROOT } else { 'C:\vcpkg' }
          $prefix = Join-Path $vcpkgRoot "installed\$triplet"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          $vsInstall = & $vswhere `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio C++ Build Tools were not detected. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          if (-not (Get-Command pkg-config -ErrorAction SilentlyContinue)) {
            throw "pkg-config was not found on PATH. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            throw "Perl was not found on PATH. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }

          $required = @(
            (Join-Path $vcpkgRoot 'vcpkg.exe'),
            (Join-Path $prefix 'include\zmq.h'),
            (Join-Path $prefix 'lib\openblas.lib'),
            (Join-Path $prefix 'lib\lapack.lib'),
            (Join-Path $prefix 'lib\pkgconfig\libzmq.pc')
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required Windows dependency artifact: $path. Provision the runner with scripts/bootstrap-windows-runner.ps1."
            }
          }
          $zmqImportLibs = Get-ChildItem -Path (Join-Path $prefix 'lib') -Filter '*zmq*.lib' -ErrorAction SilentlyContinue
          if (-not $zmqImportLibs) {
            throw "Missing required ZeroMQ import library under $prefix\lib. Provision the runner with scripts/bootstrap-windows-runner.ps1."
          }

          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_TRIPLET=$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_DYNAMIC=1"
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$prefix\include;$env:INCLUDE"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$prefix\lib;$env:LIB"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_PATH=$prefix"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_INCLUDE_DIR=$prefix\include"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_LIB_DIR=$prefix\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$prefix\lib\pkgconfig"
          Add-Content -Path $env:GITHUB_PATH -Value $vcpkgRoot
          Add-Content -Path $env:GITHUB_PATH -Value "$prefix\bin"
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIB_DIR=$prefix\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIBS=openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIB_DIR=$prefix\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIBS=lapack;openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENBLAS_DIR=$prefix"

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy (Unix)
        if: runner.os != 'Windows'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Clippy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Verify the binary starts without a stack overflow before running the
      # full suite. This catches regressions where the main-thread stack is
      # exhausted by Clap's parser (common on Windows with large CLI structs).
      # Placed before the full test suite so the most fundamental failure fails fast.
      - name: Binary smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build -p runmat
          & target\debug\runmat.exe --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Error "runmat --help failed (exit $LASTEXITCODE) - possible stack overflow"
            exit 1
          }
          Write-Host "Smoke test passed"  

      - name: Check (Unix)
        if: runner.os != 'Windows'
        run: cargo check --all-targets --all-features

      - name: Test (Linux)
        if: runner.os == 'Linux'
        env:
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -o pipefail
          cargo test --all-targets --all-features 2>&1 | tee test.log

      - name: Test (macOS)
        if: runner.os == 'macOS'
        env:
          RUST_BACKTRACE: 1
        run: |
          set -o pipefail
          cargo test --all-targets --all-features 2>&1 | tee test.log

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          $ErrorActionPreference = 'Stop'
          cargo test --all-targets --all-features 2>&1 | Tee-Object -FilePath test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('test.log', 'utf8');
            const matrixName = process.env.MATRIX_NAME || 'matrix';
            let totalPassed = 0;
            let totalFailed = 0;
            let current = '';
            const details = [];
            for (const line of log.split('\n')) {
              const run = line.match(/Running .*deps\/(.+?)-[a-f0-9]+\)/);
              if (run) current = run[1];
              const m = line.match(/test result: .*?(\d+) passed; (\d+) failed.*finished in ([0-9.]+)s/);
              if (m) {
                const passed = parseInt(m[1], 10);
                const failed = parseInt(m[2], 10);
                totalPassed += passed;
                totalFailed += failed;
                details.push(`- ${matrixName} / ${current || 'crate'}: ${passed} passed, ${failed} failed (${m[3]}s)`);
                current = '';
              }
            }
            let body = '**Test Summary**\n';
            body += details.join('\n');
            body += `\n**Totals**: ${totalPassed} passed, ${totalFailed} failed`;
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } else {
              console.log(body);
            }

  cross-build:
    # Build all release targets so failures are caught before tagging
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    name: Cross build ${{ matrix.platform.release_for }}
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        platform:
          - release_for: windows-x86_64
            os: windows-latest-l
            target: x86_64-pc-windows-msvc
            command: build
          - release_for: macos-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            command: build
          - release_for: macos-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            command: build
          - release_for: linux-x86_64
            os: ubuntu-latest-gpu
            target: x86_64-unknown-linux-gnu
            command: build
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install BLAS/LAPACK dependencies (Linux x86_64)
        if: runner.os == 'Linux' && matrix.platform.os != 'ubuntu-latest-arm-l'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev libzmq3-dev pkg-config libssl-dev

      - name: Install macOS dependencies (ZMQ)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install zeromq

      - name: Install Windows MSVC dependencies (ZMQ, vcpkg + OpenBLAS/LAPACK)
        if: runner.os == 'Windows' && matrix.platform.target != 'aarch64-pc-windows-gnu'
        shell: pwsh
        run: |
          choco install -y pkgconfiglite strawberryperl

          Write-Host "Fetching prebuilt ZeroMQ for Windows (MSVC)"
          curl -L -o libzmq.zip https://github.com/zeromq/libzmq/releases/download/v4.3.5/zeromq-4.3.5.zip
          Expand-Archive -Path libzmq.zip -DestinationPath zmq
          # Set env vars for ZMQ include/lib
          $zmq = Join-Path $pwd "zmq"
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$($zmq)\include;$env:INCLUDE"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$($zmq)\lib;$env:LIB"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_PATH=$($zmq)"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$($zmq)\lib\pkgconfig"

          Write-Host "Cloning vcpkg and installing OpenBLAS/LAPACK"
          $vcpkgRoot = Join-Path $pwd "vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat"

          # Compute vcpkg triplet based on target
          if (Test-Path env:MatrixPlatformTarget) { Remove-Item env:MatrixPlatformTarget }
          $env:MatrixPlatformTarget = "${{ matrix.platform.target }}"
          if ($env:MatrixPlatformTarget -eq "aarch64-pc-windows-msvc") { $triplet = "arm64-windows" } else { $triplet = "x64-windows" }

          # Ensure triplet in env
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_TRIPLET=$triplet"

          # Install OpenBLAS and LAPACK provider; on arm64-windows use --allow-unsupported for gfortran
          & "$vcpkgRoot\vcpkg.exe" install "openblas:$triplet"
          if ($triplet -eq "arm64-windows") {
            & "$vcpkgRoot\vcpkg.exe" install "lapack-reference:$triplet" --allow-unsupported
          } else {
            & "$vcpkgRoot\vcpkg.exe" install "lapack-reference:$triplet"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_DYNAMIC=1"
          Add-Content -Path $env:GITHUB_PATH -Value "$vcpkgRoot\installed\$triplet\bin"

          # Hint BLAS/LAPACK discovery for blas-sys/lapack-sys
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIB_DIR=$vcpkgRoot\installed\$triplet\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIBS=openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIB_DIR=$vcpkgRoot\installed\$triplet\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIBS=lapack;openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENBLAS_DIR=$vcpkgRoot\installed\$triplet"

      - name: Cross build (linux-x86_64)
        if: matrix.platform.target == 'x86_64-unknown-linux-gnu'
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: ${{ matrix.platform.command }}
          target: ${{ matrix.platform.target }}
          # Build all targets with full BLAS+LAPACK
          args: "--locked --release --bin runmat --features blas-lapack"
          strip: false

      - name: Cross build (other targets)
        if: matrix.platform.target != 'x86_64-unknown-linux-gnu'
        uses: houseabsolute/actions-rust-cross@v0
        env:
          OPENSSL_NO_PKG_CONFIG: '1'
          OPENSSL_STATIC: '1'
        with:
          command: ${{ matrix.platform.command }}
          target: ${{ matrix.platform.target }}
          # Build all targets with full BLAS+LAPACK
          args: "--locked --release --bin runmat --features blas-lapack,vendored-openssl"
          strip: false

