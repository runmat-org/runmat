name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Run on pushes for all branches, and only on PRs from forks to avoid double CI on same-repo PRs
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - runner: ["self-hosted", "linux", "gpu"]
            name: linux-x86_64
          - runner: ["self-hosted", "windows", "gpu"]
            name: windows-x86_64
          - runner: macos-latest
            name: macos-universal
    runs-on: ${{ matrix.runner }}
    env:
      # Enable backtraces on CI to aid debugging of panics/segfaults
      RUST_BACKTRACE: 1
      MATRIX_NAME: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust toolchain (Windows self-hosted)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RUST_TOOLCHAIN: 1.90.0
          RUST_COMPONENTS: rustfmt clippy
        run: |
          $toolchain = $env:RUST_TOOLCHAIN
          $components = $env:RUST_COMPONENTS.Split(' ')
          $cargoBin = Join-Path $env:USERPROFILE '.cargo\bin'
          $rustup = Join-Path $cargoBin 'rustup.exe'
          if (-not (Test-Path $cargoBin)) {
            New-Item -ItemType Directory -Path $cargoBin | Out-Null
          }
          if (-not (Test-Path $rustup)) {
            $tmp = Join-Path $env:USERPROFILE 'actions-runner\_work\_temp\rustup-init.exe'
            Invoke-WebRequest -Uri https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe -OutFile $tmp
            & $tmp -y --default-host x86_64-pc-windows-msvc --default-toolchain $toolchain
          } else {
            & $rustup default $toolchain
          }
          foreach ($component in $components) {
            & $rustup component add --toolchain $toolchain $component
          }

      - uses: actions-rs/toolchain@v1
        if: runner.os != 'Windows'
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies (BLAS/LAPACK, ZMQ, GUI, OpenSSL)
        if: runner.os == 'Linux'
        run: |
          # TEMP: include gdb while investigating Linux GPU segfaults (remove once resolved)
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libopenblas-dev liblapack-dev libssl-dev \
            libzmq3-dev pkg-config \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-0 libwayland-dev \
            libegl1-mesa-dev libgl1-mesa-dev \
            libudev-dev libdbus-1-dev ca-certificates \
            gdb

      - name: Install macOS dependencies (ZMQ)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install zeromq

      - name: Install Windows dependencies (ZMQ, vcpkg + OpenBLAS)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y pkgconfiglite

          Write-Host "Fetching prebuilt ZeroMQ for Windows (MSVC)"
          curl -L -o libzmq.zip https://github.com/zeromq/libzmq/releases/download/v4.3.5/zeromq-4.3.5.zip
          Expand-Archive -Path libzmq.zip -DestinationPath zmq
          # Set env vars for ZMQ include/lib
          $zmq = Join-Path $pwd "zmq"
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$($zmq)\include;$env:INCLUDE"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$($zmq)\lib;$env:LIB"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_PATH=$($zmq)"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$($zmq)\lib\pkgconfig"

          Write-Host "Cloning vcpkg and installing OpenBLAS/LAPACK"
          $vcpkgRoot = Join-Path $pwd "vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat"
          # Ensure x64 triplet
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=x64-windows"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_TRIPLET=x64-windows"
          # Install OpenBLAS with LAPACK symbols and ensure DLLs are on PATH
          & "$vcpkgRoot\vcpkg.exe" install openblas:x64-windows
          # Install LAPACK provider (use lapack-reference on Windows)
          & "$vcpkgRoot\vcpkg.exe" install lapack-reference:x64-windows
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_DYNAMIC=1"
          Add-Content -Path $env:GITHUB_PATH -Value "$vcpkgRoot\installed\x64-windows\bin"
          # Hint BLAS/LAPACK discovery for blas-sys/lapack-sys
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIB_DIR=$vcpkgRoot\installed\x64-windows\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIBS=openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIB_DIR=$vcpkgRoot\installed\x64-windows\lib"
          # Prefer lapack if present; keep openblas as fallback
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIBS=lapack;openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENBLAS_DIR=$vcpkgRoot\installed\x64-windows"

      - name: Format
        run: cargo fmt -- --check

      - name: Clippy (Unix)
        if: runner.os != 'Windows'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Clippy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Verify the binary starts without a stack overflow before running the
      # full suite. This catches regressions where the main-thread stack is
      # exhausted by Clap's parser (common on Windows with large CLI structs).
      # Placed before cargo-check so the most fundamental failure fails fast.
      - name: Binary smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build -p runmat
          & target\debug\runmat.exe --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Error "runmat --help failed (exit $LASTEXITCODE) - possible stack overflow"
            exit 1
          }
          Write-Host "Smoke test passed"  

      - name: Check (Unix)
        if: runner.os != 'Windows'
        run: cargo check --all-targets --all-features

      - name: Check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo check --all-targets --all-features

      - name: Test (Unix)
        if: runner.os != 'Windows'
        env:
          RUST_BACKTRACE: 1
        run: |
          set -o pipefail
          cargo test --all-targets --all-features 2>&1 | tee test.log

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RUST_BACKTRACE: 1
        run: |
          $ErrorActionPreference = 'Stop'
          cargo test --all-targets --all-features 2>&1 | Tee-Object -FilePath test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload analysis benchmark artifacts
        if: always() && ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release'))) || (github.event_name == 'pull_request' && failure()))
        uses: actions/upload-artifact@v4
        with:
          name: analysis-benchmark-${{ matrix.name }}
          path: target/runmat-analysis-artifacts/*.json
          if-no-files-found: warn

      - name: Test Summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('test.log', 'utf8');
            const matrixName = process.env.MATRIX_NAME || 'matrix';
            let totalPassed = 0;
            let totalFailed = 0;
            let current = '';
            const details = [];
            for (const line of log.split('\n')) {
              const run = line.match(/Running .*deps\/(.+?)-[a-f0-9]+\)/);
              if (run) current = run[1];
              const m = line.match(/test result: .*?(\d+) passed; (\d+) failed.*finished in ([0-9.]+)s/);
              if (m) {
                const passed = parseInt(m[1], 10);
                const failed = parseInt(m[2], 10);
                totalPassed += passed;
                totalFailed += failed;
                details.push(`- ${matrixName} / ${current || 'crate'}: ${passed} passed, ${failed} failed (${m[3]}s)`);
                current = '';
              }
            }
            let body = '**Test Summary**\n';
            body += details.join('\n');
            body += `\n**Totals**: ${totalPassed} passed, ${totalFailed} failed`;
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } else {
              console.log(body);
            }

  nonlinear-conformance:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    name: nonlinear-conformance
    runs-on: ["self-hosted", "linux", "gpu"]
    env:
      RUST_BACKTRACE: 1
      RUNMAT_ANALYSIS_ENFORCE_BASELINE_ON_PROTECTED: "true"
      RUNMAT_ANALYSIS_PROTECTED_BRANCHES: "main,master,release"
      RUNMAT_ANALYSIS_BASELINE_DIR: target/runmat-analysis-artifacts/rolling
      RUNMAT_ANALYSIS_BASELINE_WINDOW: "12"
      RUNMAT_ANALYSIS_MAX_SLOWDOWN_RATIO: "1.35"
      RUNMAT_ANALYSIS_MAX_COST_SLOWDOWN_RATIO: "1.5"
      RUNMAT_ANALYSIS_MIN_SPEEDUP_RETENTION: "0.8"
      RUNMAT_GEOMETRY_PREP_ARTIFACT_ROOT: target/runmat-prep-artifacts
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.90.0

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies (BLAS/LAPACK, ZMQ, OpenSSL)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libopenblas-dev liblapack-dev libssl-dev \
            libzmq3-dev pkg-config ca-certificates

      - name: Run nonlinear benchmark conformance
        run: cargo test -p runmat-runtime --test analysis

      - name: Verify filesystem artifact replay stability
        env:
          RUNMAT_ANALYSIS_ARTIFACT_STORE: filesystem
          RUNMAT_ANALYSIS_ARTIFACT_ROOT: target/runmat-analysis-store
          RUNMAT_ANALYSIS_ARTIFACT_MAX_RUNS: "0"
          RUNMAT_ANALYSIS_ARTIFACT_MAX_RUNS_PER_KIND: "0"
        run: cargo test -p runmat-runtime analysis::tests::analysis_results_by_run_id_filesystem_replay_is_stable

      - name: Mark artifact replay verification passed
        if: success()
        run: echo "RUNMAT_RELEASE_READINESS_ARTIFACT_REPLAY_OK=true" >> "$GITHUB_ENV"

      - name: Validate nonlinear benchmark report keys
        run: python3 scripts/validate_analysis_report_nonlinear.py

      - name: Enforce thermo summary presence on thermo-gated branches
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        env:
          RUNMAT_VALIDATE_REQUIRE_THERMO_SUMMARY: "true"
          RUNMAT_VALIDATE_REQUIRE_THERMO_FIELD_SUMMARY: "true"
          RUNMAT_VALIDATE_REQUIRE_ELECTRO_SUMMARY: "true"
          RUNMAT_VALIDATE_REQUIRE_PLASTIC_SUMMARY: "true"
          RUNMAT_VALIDATE_REQUIRE_CONTACT_SUMMARY: "true"
        run: python3 scripts/validate_analysis_report_nonlinear.py

      - name: Enforce non-default thermo signing key on release branches
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        env:
          RUNMAT_THERMO_FIELD_SIGNING_KEY: ${{ secrets.RUNMAT_THERMO_FIELD_SIGNING_KEY }}
        run: |
          if [ -z "${RUNMAT_THERMO_FIELD_SIGNING_KEY}" ]; then
            echo "RUNMAT_THERMO_FIELD_SIGNING_KEY secret is required on release branches"
            exit 1
          fi
          if [ "${RUNMAT_THERMO_FIELD_SIGNING_KEY}" = "runmat-dev-thermo-signing-key" ]; then
            echo "default dev signing key is not allowed on release branches"
            exit 1
          fi

      - name: Verify thermo field artifact trust chain
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          artifacts = sorted(Path("target/runmat-analysis-artifacts/thermo-fields").glob("*.json"))
          report = {
              "schema_version": "thermo-field-trust-report/v1",
              "artifact_count": len(artifacts),
              "artifacts": [],
              "passed": True,
          }
          lines = ["## Thermo Field Trust Report", "", f"Artifacts: `{len(artifacts)}`"]
          for artifact in artifacts:
              proc = subprocess.run(
                  ["python3", "scripts/validate_thermo_field_artifact.py", str(artifact)],
                  capture_output=True,
                  text=True,
              )
              ok = proc.returncode == 0
              report["artifacts"].append(
                  {
                      "path": str(artifact),
                      "valid": ok,
                      "stdout": proc.stdout.strip(),
                      "stderr": proc.stderr.strip(),
                  }
              )
              lines.append(f"- `{artifact}`: {'ok' if ok else 'invalid'}")
              if not ok:
                  report["passed"] = False
          out_json = Path("target/runmat-analysis-artifacts/thermo_field_trust_report.json")
          out_md = Path("thermo-field-trust-report.md")
          out_json.parent.mkdir(parents=True, exist_ok=True)
          out_json.write_text(json.dumps(report, indent=2) + "\n")
          out_md.write_text("\n".join(lines) + "\n")
          print(out_md.read_text())
          if artifacts and not report["passed"]:
              raise SystemExit(1)
          PY
          cat thermo-field-trust-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Mark artifact compatibility verification passed
        if: success()
        run: echo "RUNMAT_RELEASE_READINESS_ARTIFACT_COMPAT_OK=true" >> "$GITHUB_ENV"

      - name: Test release readiness script logic
        run: |
          python3 -m unittest \
            scripts.tests.test_release_readiness_nonlinear \
            scripts.tests.test_generate_threshold_ratchet_report \
            scripts.tests.test_validate_threshold_ratchet_report \
            scripts.tests.test_evaluate_prep_calibration_drift \
            scripts.tests.test_promote_prep_calibration_evidence

      - name: Validate prep calibration evidence
        run: python3 scripts/validate_prep_calibration_evidence.py

      - name: Generate prep calibration recommendations
        env:
          RUNMAT_RELEASE_READINESS_PREP_RETRAIN_TRIGGER_DRIFT: "0.1"
        run: python3 scripts/generate_prep_calibration_recommendations.py

      - name: Verify governance artifacts exist
        run: |
          test -f target/runmat-analysis-artifacts/prep_calibration_evidence_validation.json
          test -f target/runmat-analysis-artifacts/prep_calibration_recommendations.json

      - name: Validate prep calibration evidence promotion
        env:
          RUNMAT_PREP_CALIBRATION_EVIDENCE_CANDIDATE: scripts/prep_calibration_evidence.json
          RUNMAT_PREP_CALIBRATION_EVIDENCE_APPROVED: target/runmat-analysis-artifacts/prep_calibration_evidence_approved.json
          RUNMAT_PREP_CALIBRATION_RECOMMENDATIONS_INPUT: target/runmat-analysis-artifacts/prep_calibration_recommendations.json
          RUNMAT_PREP_CALIBRATION_PROMOTION_MAX_RECOMMENDATIONS: "64"
        run: python3 scripts/promote_prep_calibration_evidence.py

      - name: Verify promotion artifact exists
        run: test -f target/runmat-analysis-artifacts/prep_calibration_evidence_approved.json

      - name: Analyze nonlinear rolling trends
        if: always()
        env:
          RUNMAT_ANALYSIS_TREND_WINDOW: "8"
          RUNMAT_ANALYSIS_TREND_MAX_SLOWDOWN_RATIO: "1.25"
        run: |
          python3 scripts/analyze_nonlinear_trends.py | tee nonlinear-trends.md
          cat nonlinear-trends.md >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize nonlinear report
        if: always()
        run: |
          python3 scripts/summarize_analysis_report.py | tee nonlinear-summary.md
          cat nonlinear-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize prep artifact SLO
        if: always()
        env:
          RUNMAT_PREP_SLO_WARN_ARTIFACT_COUNT: "64"
          RUNMAT_PREP_SLO_FAIL_ARTIFACT_COUNT: "128"
          RUNMAT_PREP_SLO_WARN_P95_AGE_SECONDS: "604800"
          RUNMAT_PREP_SLO_FAIL_P95_AGE_SECONDS: "1209600"
        run: |
          python3 scripts/summarize_prep_artifacts.py | tee prep-artifact-slo.md
          cat prep-artifact-slo.md >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate nonlinear release readiness
        if: always()
        env:
          RUNMAT_RELEASE_READINESS_MAX_SLOWDOWN_RATIO: "1.25"
          RUNMAT_RELEASE_READINESS_PREP_WARN_ARTIFACT_COUNT: "64"
          RUNMAT_RELEASE_READINESS_PREP_FAIL_ARTIFACT_COUNT: "128"
          RUNMAT_RELEASE_READINESS_PREP_WARN_P95_AGE_SECONDS: "604800"
          RUNMAT_RELEASE_READINESS_PREP_FAIL_P95_AGE_SECONDS: "1209600"
          RUNMAT_RELEASE_READINESS_PREP_MAX_REJECT_RATE: "0.25"
          RUNMAT_RELEASE_READINESS_PREP_REQUIRE_RECOMMENDATION_ARTIFACT: "true"
          RUNMAT_RELEASE_READINESS_PREP_CANDIDATE_MAX_AGE_DAYS: "14"
          RUNMAT_PREP_CALIBRATION_RECOMMENDATIONS_INPUT: target/runmat-analysis-artifacts/prep_calibration_recommendations.json
          RUNMAT_THERMO_FIELD_SIGNING_KEY: ${{ secrets.RUNMAT_THERMO_FIELD_SIGNING_KEY }}
        run: |
          python3 scripts/release_readiness_nonlinear.py | tee nonlinear-release-readiness.md
          cat nonlinear-release-readiness.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate threshold ratchet report
        if: always()
        run: |
          python3 scripts/generate_threshold_ratchet_report.py | tee threshold-ratchet.md
          cat threshold-ratchet.md >> "$GITHUB_STEP_SUMMARY"

      - name: Validate threshold ratchet report
        if: always()
        env:
          RUNMAT_VALIDATE_THRESHOLD_RATCHET_ENFORCE: "true"
          RUNMAT_VALIDATE_THRESHOLD_RATCHET_REQUIRE_OBSERVED: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
        run: python3 scripts/validate_threshold_ratchet_report.py

      - name: Summarize governance artifacts
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          rec_path = Path("target/runmat-analysis-artifacts/prep_calibration_recommendations.json")
          ready_path = Path("target/runmat-analysis-artifacts/nonlinear_release_readiness.json")
          ratchet_path = Path("target/runmat-analysis-artifacts/threshold_ratchet_report.json")
          lines = ["## Tier 7.5 Governance", ""]
          if rec_path.exists():
              rec = json.loads(rec_path.read_text())
              lines.append(f"- Recommendation count: {rec.get('recommendation_count', 0)}")
          else:
              lines.append("- Recommendation artifact: missing")
          if ready_path.exists():
              ready = json.loads(ready_path.read_text())
              lines.append(f"- Governance profile: {ready.get('governance_profile', 'unknown')}")
              lines.append(f"- Readiness verdict: {ready.get('verdict', 'unknown')}")
              thermo_enabled_rate = ready.get('thermo_coupling_enabled_rate')
              thermo_max_transient = ready.get('thermo_max_transient_severity')
              thermo_max_nonlinear = ready.get('thermo_max_nonlinear_severity')
              thermo_max_spread = ready.get('thermo_max_spread_ratio')
              thermo_spread_threshold = ready.get('thermo_max_spread_ratio_threshold')
              thermo_max_heterogeneity = ready.get('thermo_max_heterogeneity_index')
              thermo_min_field_coverage = ready.get('thermo_min_field_coverage_ratio')
              thermo_field_coverage_threshold = ready.get('thermo_min_field_coverage_ratio_threshold')
              thermo_max_field_extrapolation = ready.get('thermo_max_field_extrapolation_ratio')
              thermo_field_extrapolation_threshold = ready.get('thermo_max_field_extrapolation_ratio_threshold')
              thermo_field_coverage_drop_trend_ratio = ready.get('thermo_field_coverage_drop_trend_ratio')
              thermo_field_coverage_drop_trend_threshold = ready.get('thermo_max_field_coverage_drop_trend_ratio')
              thermo_field_extrapolation_trend_ratio = ready.get('thermo_field_extrapolation_trend_ratio')
              thermo_field_extrapolation_trend_threshold = ready.get('thermo_max_field_extrapolation_trend_ratio')
              thermo_require_artifact_backed = ready.get('thermo_require_artifact_backed')
              thermo_field_artifact_max_age_days = ready.get('thermo_field_artifact_max_age_days')
              thermo_spread_breach_rate = ready.get('thermo_spread_breach_rate')
              thermo_heterogeneity_breach_rate = ready.get('thermo_heterogeneity_breach_rate')
              electro_enabled_rate = ready.get('electro_coupling_enabled_rate')
              electro_max_transient = ready.get('electro_max_transient_severity')
              electro_max_nonlinear = ready.get('electro_max_nonlinear_severity')
              electro_max_joule = ready.get('electro_max_joule_heating_scale')
              electro_joule_threshold = ready.get('electro_max_joule_heating_scale_threshold')
              electro_max_spread = ready.get('electro_max_conductivity_spread_ratio')
              electro_spread_threshold = ready.get('electro_max_conductivity_spread_ratio_threshold')
              electro_joule_breach_rate = ready.get('electro_joule_breach_rate')
              electro_spread_breach_rate = ready.get('electro_spread_breach_rate')
              electro_joule_trend_ratio = ready.get('electro_joule_trend_ratio')
              electro_spread_trend_ratio = ready.get('electro_spread_trend_ratio')
              plastic_max_severity = ready.get('plastic_max_nonlinear_severity')
              plastic_severity_threshold = ready.get('plastic_max_nonlinear_severity_threshold')
              plastic_breach_rate = ready.get('plastic_breach_rate')
              plastic_trend_ratio = ready.get('plastic_trend_ratio')
              plastic_reference_trend_ratio = ready.get('plastic_reference_trend_ratio')
              plastic_reference_trend_threshold = ready.get('plastic_reference_max_trend_ratio_threshold')
              contact_max_severity = ready.get('contact_max_nonlinear_severity')
              contact_severity_threshold = ready.get('contact_max_nonlinear_severity_threshold')
              contact_breach_rate = ready.get('contact_breach_rate')
              contact_trend_ratio = ready.get('contact_trend_ratio')
              contact_reference_trend_ratio = ready.get('contact_reference_trend_ratio')
              contact_reference_trend_threshold = ready.get('contact_reference_max_trend_ratio_threshold')
              reference_trend_ratcheted = ready.get('reference_trend_ratcheted')
              reference_trend_rationale = ready.get('reference_trend_rationale')
              rolling_report_count = ready.get('rolling_report_count')
              lines.append(
                  "- Thermo coupling enabled-rate: "
                  f"{thermo_enabled_rate if thermo_enabled_rate is not None else '-'}"
              )
              lines.append(
                  "- Thermo max transient severity: "
                  f"{thermo_max_transient if thermo_max_transient is not None else '-'}"
              )
              lines.append(
                  "- Thermo max nonlinear severity: "
                  f"{thermo_max_nonlinear if thermo_max_nonlinear is not None else '-'}"
              )
              lines.append(
                  "- Thermo max spread ratio: "
                  f"{thermo_max_spread if thermo_max_spread is not None else '-'}"
              )
              lines.append(
                  "- Thermo spread ratio threshold: "
                  f"{thermo_spread_threshold if thermo_spread_threshold is not None else '-'}"
              )
              if ready.get('governance_profile') == 'feature':
                  lines.append(
                      "- Feature-profile posture: allows thermo spread up to 1.6 to absorb pathological fixture variance"
                  )
              lines.append(
                  "- Thermo max heterogeneity index: "
                  f"{thermo_max_heterogeneity if thermo_max_heterogeneity is not None else '-'}"
              )
              lines.append(
