        uses: actions/upload-artifact@v4
        with:
          name: fea-conformance-${{ github.run_id }}
          path: |
            target/runmat-analysis-artifacts/analysis_benchmark_report.json
            target/runmat-analysis-artifacts/fea_release_readiness.json
            target/runmat-analysis-artifacts/threshold_ratchet_report.json
            target/runmat-analysis-artifacts/threshold_ratchet_report.md
