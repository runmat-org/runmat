            target/runmat-analysis-artifacts/prep_calibration_recommendations.json
            target/runmat-analysis-artifacts/prep_calibration_evidence_approved.json
            target/runmat-analysis-artifacts/rolling/*.json
            target/runmat-prep-artifacts/prep/*.json
            fea-conformance-summary.md
            fea-release-readiness.md
            nonlinear-trends.md
            thermo-field-trust-report.md
            prep-artifact-slo.md
            tier75-governance-summary.md
            target/runmat-analysis-artifacts/thermo_field_trust_report.json
          if-no-files-found: warn

  cross-build:
    # Build all release targets so failures are caught before tagging
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    name: Cross build ${{ matrix.platform.release_for }}
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        platform:
          - release_for: windows-x86_64
            os: windows-latest-l
            target: x86_64-pc-windows-msvc
            command: build
          - release_for: macos-x86_64
            os: macOS-latest
            target: x86_64-apple-darwin
            command: build
          - release_for: macos-aarch64
            os: macOS-latest
            target: aarch64-apple-darwin
            command: build
          - release_for: linux-x86_64
            os: ubuntu-latest-gpu
            target: x86_64-unknown-linux-gnu
            command: build
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install BLAS/LAPACK dependencies (Linux x86_64)
        if: runner.os == 'Linux' && matrix.platform.os != 'ubuntu-latest-arm-l'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libopenblas-dev liblapack-dev libzmq3-dev pkg-config libssl-dev

      - name: Install macOS dependencies (ZMQ)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew install zeromq

      - name: Install Windows MSVC dependencies (ZMQ, vcpkg + OpenBLAS/LAPACK)
        if: runner.os == 'Windows' && matrix.platform.target != 'aarch64-pc-windows-gnu'
        shell: pwsh
        run: |
          choco install -y pkgconfiglite strawberryperl cmake --installargs 'ADD_CMAKE_TO_PATH=System'

          Write-Host "Fetching prebuilt ZeroMQ for Windows (MSVC)"
          curl -L -o libzmq.zip https://github.com/zeromq/libzmq/releases/download/v4.3.5/zeromq-4.3.5.zip
          Expand-Archive -Path libzmq.zip -DestinationPath zmq
          # Set env vars for ZMQ include/lib
          $zmq = Join-Path $pwd "zmq"
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$($zmq)\include;$env:INCLUDE"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$($zmq)\lib;$env:LIB"
          Add-Content -Path $env:GITHUB_ENV -Value "ZMQ_PATH=$($zmq)"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$($zmq)\lib\pkgconfig"

          Write-Host "Cloning vcpkg and installing OpenBLAS/LAPACK"
          $vcpkgRoot = Join-Path $pwd "vcpkg"
          git clone --depth 1 --branch 2026.06.01 https://github.com/microsoft/vcpkg.git $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat"

          $finder = Join-Path $vcpkgRoot "scripts\cmake\vcpkg_find_fortran.cmake"
          $content = Get-Content -LiteralPath $finder -Raw
          $needle = "    include(CMakeDetermineFortranCompiler)"
          $replacement = @'
              include(CMakeDetermineFortranCompiler)

              if(CMAKE_HOST_WIN32 AND "${VCPKG_CHAINLOAD_TOOLCHAIN_FILE}" STREQUAL "" AND
                 ("${VCPKG_TARGET_ARCHITECTURE}" STREQUAL "x86" OR "${VCPKG_TARGET_ARCHITECTURE}" STREQUAL "x64"))
                  if(CMAKE_Fortran_COMPILER)
                      message(STATUS "Ignoring ambient Fortran compiler '${CMAKE_Fortran_COMPILER}' so vcpkg uses internal MinGW gfortran")
                      unset(CMAKE_Fortran_COMPILER)
                      unset(CMAKE_Fortran_COMPILER CACHE)
                  endif()
              endif()
          '@
          if (-not $content.Contains($replacement)) {
            if (-not $content.Contains($needle)) {
              throw "Could not find expected CMakeDetermineFortranCompiler hook in $finder"
            }
            Set-Content -LiteralPath $finder -Value $content.Replace($needle, $replacement) -NoNewline
          }

          $keptPath = [System.Collections.Generic.List[string]]::new()
          foreach ($entry in ($env:Path -split ";")) {
            if ([string]::IsNullOrWhiteSpace($entry)) {
              continue
            }
            $expanded = [Environment]::ExpandEnvironmentVariables($entry.Trim('"'))
            $hasFortran = $false
            foreach ($compiler in @("flang.exe", "flang-new.exe", "gfortran.exe", "ifort.exe", "ifx.exe")) {
              if (Test-Path -LiteralPath (Join-Path $expanded $compiler)) {
                $hasFortran = $true
                break
              }
            }
            if (-not $hasFortran) {
              $keptPath.Add($entry)
            }
          }
          Remove-Item Env:FC -ErrorAction SilentlyContinue
          Remove-Item Env:F77 -ErrorAction SilentlyContinue
          Remove-Item Env:F90 -ErrorAction SilentlyContinue
          $env:Path = [string]::Join(";", $keptPath)

          # Compute vcpkg triplet based on target
          if (Test-Path env:MatrixPlatformTarget) { Remove-Item env:MatrixPlatformTarget }
          $env:MatrixPlatformTarget = "${{ matrix.platform.target }}"
          if ($env:MatrixPlatformTarget -eq "aarch64-pc-windows-msvc") { $triplet = "arm64-windows" } else { $triplet = "x64-windows" }

          # Ensure triplet in env
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_TRIPLET=$triplet"

          # Install OpenBLAS, LAPACK, and OpenCASCADE. LAPACK must use vcpkg's
          # bundled MinGW gfortran runtime; Visual Studio flang fails this build.
          if ($triplet -eq "arm64-windows") {
            & "$vcpkgRoot\vcpkg.exe" install "openblas:$triplet" "lapack-reference:$triplet" "opencascade:$triplet" --allow-unsupported
          } else {
            & "$vcpkgRoot\vcpkg.exe" install "openblas:$triplet" "lapack-reference:$triplet" "opencascade:$triplet"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKGRS_DYNAMIC=1"
          Add-Content -Path $env:GITHUB_PATH -Value "$vcpkgRoot\installed\$triplet\bin"

          # Hint BLAS/LAPACK discovery for blas-sys/lapack-sys
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIB_DIR=$vcpkgRoot\installed\$triplet\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "BLAS_LIBS=openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIB_DIR=$vcpkgRoot\installed\$triplet\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "LAPACK_LIBS=lapack;openblas"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENBLAS_DIR=$vcpkgRoot\installed\$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "RUNMAT_OCCT_ROOT=$vcpkgRoot\installed\$triplet"
          Add-Content -Path $env:GITHUB_ENV -Value "RUNMAT_OCCT_INCLUDE_DIR=$vcpkgRoot\installed\$triplet\include\opencascade"
          Add-Content -Path $env:GITHUB_ENV -Value "RUNMAT_OCCT_LIB_DIR=$vcpkgRoot\installed\$triplet\lib"
          Add-Content -Path $env:GITHUB_ENV -Value "RUNMAT_OCCT_BIN_DIR=$vcpkgRoot\installed\$triplet\bin"
          Add-Content -Path $env:GITHUB_ENV -Value "RUNMAT_OCCT_LINK_MODE=dylib"

      - name: Cross build (linux-x86_64)
        if: matrix.platform.target == 'x86_64-unknown-linux-gnu'
        uses: houseabsolute/actions-rust-cross@v0
        env:
          RUNMAT_OCCT_LINK_MODE: static
        with:
          command: ${{ matrix.platform.command }}
          target: ${{ matrix.platform.target }}
          # Build all targets with full BLAS+LAPACK
          args: "--locked --release --bin runmat --features blas-lapack,occt-native"
          strip: false

      - name: Cross build (other targets)
        if: matrix.platform.target != 'x86_64-unknown-linux-gnu'
        uses: houseabsolute/actions-rust-cross@v0
        env:
          OPENSSL_NO_PKG_CONFIG: '1'
          OPENSSL_STATIC: '1'
          RUNMAT_OCCT_LINK_MODE: ${{ runner.os == 'Windows' && 'dylib' || 'static' }}
        with:
          command: ${{ matrix.platform.command }}
          target: ${{ matrix.platform.target }}
          # Build all targets with full BLAS+LAPACK
          args: "--locked --release --bin runmat --features blas-lapack,vendored-openssl,occt-native"
          strip: false
