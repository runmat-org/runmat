name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Run on pushes for all branches, and only on PRs from forks to avoid double CI on same-repo PRs
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - runner: ["self-hosted", "linux", "GCP"]
            name: linux-x86_64
          - runner: macos-latest
            name: macos-universal
    runs-on: ${{ matrix.runner }}
    env:
      # Enable backtraces on CI to aid debugging of panics/segfaults
      RUST_BACKTRACE: 1
      MATRIX_NAME: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v3

      - name: Validate Rust toolchain (Linux self-hosted)
        if: runner.os == 'Linux'
        shell: bash
        env:
          RUST_TOOLCHAIN: 1.90.0-x86_64-unknown-linux-gnu
          RUST_COMPONENTS: rustfmt clippy
        run: |
          set -euo pipefail

          toolchain="${RUST_TOOLCHAIN}"
          cargo_home="${CARGO_HOME:-${HOME}/.cargo}"
          rustup_home="${RUSTUP_HOME:-${HOME}/.rustup}"
          cargo_bin="${cargo_home}/bin"
          rustup="${cargo_bin}/rustup"
          cargo="${cargo_bin}/cargo"

          if [[ ! -x "${rustup}" ]]; then
            echo "Missing rustup at ${rustup}. Provision the runner with infra/scripts/bootstrap-linux-runner.sh." >&2
            exit 1
          fi
          if [[ ! -x "${cargo}" ]]; then
            echo "Missing cargo at ${cargo}. Provision the runner with infra/scripts/bootstrap-linux-runner.sh." >&2
            exit 1
          fi

          {
            echo "CARGO_HOME=${cargo_home}"
            echo "RUSTUP_HOME=${rustup_home}"
            echo "RUSTUP_TOOLCHAIN=${toolchain}"
          } >> "${GITHUB_ENV}"
          echo "${cargo_bin}" >> "${GITHUB_PATH}"

          "${rustup}" which --toolchain "${toolchain}" cargo >/dev/null
          installed_components="$("${rustup}" component list --toolchain "${toolchain}" --installed)"
          for component in ${RUST_COMPONENTS}; do
            if ! grep -q "^${component}-" <<<"${installed_components}"; then
              echo "Missing Rust component '${component}' for toolchain ${toolchain}. Provision the runner with infra/scripts/bootstrap-linux-runner.sh." >&2
              exit 1
            fi
          done
          "${cargo}" -V
          "${cargo_bin}/rustc" -V

      - uses: actions-rs/toolchain@v1
        if: runner.os == 'macOS'
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        if: runner.os == 'macOS'

      - name: Validate Linux runner dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          packages=(
            build-essential
            ca-certificates
            cmake
            curl
            autoconf
            autoconf-archive
            automake
            gdb
            git
            libtool
            libdbus-1-dev
            libegl1-mesa-dev
            libgl1-mesa-dev
            liblapack-dev
            libopenblas-dev
            libssl-dev
            libudev-dev
            libwayland-dev
            libx11-dev
            libxcursor-dev
            libxi-dev
            libxinerama-dev
            libxkbcommon-dev
            libxkbcommon-x11-0
            libxrandr-dev
            libzmq3-dev
            ninja-build
            pkg-config
            unzip
            zip
          )

          missing=()
          ldconfig_bin="$(command -v ldconfig || true)"
          if [[ -z "${ldconfig_bin}" && -x /usr/sbin/ldconfig ]]; then
            ldconfig_bin=/usr/sbin/ldconfig
          fi
          for pkg in "${packages[@]}"; do
            if ! dpkg-query -W -f='${Status}\n' "${pkg}" 2>/dev/null | grep -qx 'install ok installed'; then
              missing+=("${pkg}")
            fi
          done

          if ! command -v pkg-config >/dev/null 2>&1; then
            missing+=('pkg-config(binary)')
          fi
          if ! command -v cmake >/dev/null 2>&1; then
            missing+=('cmake(binary)')
          fi
          if ! command -v gdb >/dev/null 2>&1; then
            missing+=('gdb(binary)')
          fi
          if ! command -v unzip >/dev/null 2>&1; then
            missing+=('unzip(binary)')
          fi
          if ! command -v zip >/dev/null 2>&1; then
            missing+=('zip(binary)')
          fi
          if ! command -v ninja >/dev/null 2>&1; then
            missing+=('ninja(binary)')
          fi
          if ! pkg-config --exists libzmq; then
            missing+=('libzmq(pkg-config)')
          fi
          if [[ -z "${ldconfig_bin}" ]]; then
            missing+=('ldconfig(binary)')
          elif ! "${ldconfig_bin}" -p | grep -q 'libopenblas\.so'; then
            missing+=('libopenblas(runtime)')
          fi
          if [[ -n "${ldconfig_bin}" ]] && ! "${ldconfig_bin}" -p | grep -q 'liblapack\.so'; then
            missing+=('liblapack(runtime)')
          fi

          if ((${#missing[@]} > 0)); then
            printf 'Missing Linux runner prerequisites:\n' >&2
            printf '  %s\n' "${missing[@]}" >&2
            echo "Provision the runner with infra/scripts/bootstrap-linux-runner.sh." >&2
            exit 1
          fi

      - name: Ensure pinned Linux OpenCASCADE (vcpkg)
        if: runner.os == 'Linux'
        shell: bash
        env:
          RUNMAT_VCPKG_REF: 2026.06.01
          RUNMAT_VCPKG_TRIPLET: x64-linux-runmat-dynamic-release
        run: infra/scripts/ensure-linux-vcpkg-occt.sh

      - name: Install macOS dependencies (ZMQ)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install zeromq

      - name: Format
        run: cargo fmt -- --check

      - name: Validate public FEA field ids
        run: python3 scripts/fea/governance/validate_public_field_ids.py

      - name: Clippy (Unix)
        run: cargo clippy --all-targets --all-features -- -D warnings


      - name: Check (Unix)
        run: cargo check --all-targets --all-features

      - name: Test (Linux)
        if: runner.os == 'Linux'
        env:
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -o pipefail
          cargo test --all-targets --all-features 2>&1 | tee test.log

      - name: Test (macOS)
        if: runner.os == 'macOS'
        env:
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -o pipefail
          cargo test --all-targets --all-features 2>&1 | tee test.log

      - name: Upload analysis benchmark artifacts
        if: always() && ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && failure()))
        uses: actions/upload-artifact@v4
        with:
          name: analysis-benchmark-${{ matrix.name }}
          path: target/runmat-analysis-artifacts/*.json
          if-no-files-found: warn

      - name: Test Summary
        if: always() && github.event_name == 'pull_request' && hashFiles('test.log') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('test.log', 'utf8');
            const matrixName = process.env.MATRIX_NAME || 'matrix';
            let totalPassed = 0;
            let totalFailed = 0;
            let current = '';
            const details = [];
            for (const line of log.split('\n')) {
              const run = line.match(/Running .*deps\/(.+?)-[a-f0-9]+\)/);
              if (run) current = run[1];
              const m = line.match(/test result: .*?(\d+) passed; (\d+) failed.*finished in ([0-9.]+)s/);
              if (m) {
                const passed = parseInt(m[1], 10);
                const failed = parseInt(m[2], 10);
                totalPassed += passed;
                totalFailed += failed;
                details.push(`- ${matrixName} / ${current || 'crate'}: ${passed} passed, ${failed} failed (${m[3]}s)`);
                current = '';
              }
            }
            let body = '**Test Summary**\n';
            body += details.join('\n');
            body += `\n**Totals**: ${totalPassed} passed, ${totalFailed} failed`;
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } else {
              console.log(body);
            }

  fea-conformance:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/')))
    name: fea-conformance
    runs-on: ubuntu-latest-gpu
    env:
      RUST_BACKTRACE: 1
      RUNMAT_ANALYSIS_ENFORCE_BASELINE_ON_PROTECTED: "true"
      RUNMAT_ANALYSIS_PROTECTED_BRANCHES: "main,master,release"
      RUNMAT_ANALYSIS_BASELINE_DIR: ${{ github.workspace }}/target/runmat-analysis-artifacts/rolling
      RUNMAT_FEA_BASELINE_DIR: ${{ github.workspace }}/target/runmat-analysis-artifacts/rolling
      RUNMAT_ANALYSIS_BASELINE_WINDOW: "12"
      RUNMAT_ANALYSIS_MAX_SLOWDOWN_RATIO: "1.35"
      RUNMAT_ANALYSIS_MAX_COST_SLOWDOWN_RATIO: "1.5"
      RUNMAT_ANALYSIS_MIN_SPEEDUP_RETENTION: "0.8"
      RUNMAT_ANALYSIS_ARTIFACT_PATH: ${{ github.workspace }}/target/runmat-analysis-artifacts/analysis_benchmark_report.json
      RUNMAT_FEA_ARTIFACT_PATH: ${{ github.workspace }}/target/runmat-analysis-artifacts/analysis_benchmark_report.json
      RUNMAT_ANALYSIS_ARTIFACT_ROOT: ${{ github.workspace }}/target/runmat-analysis-artifacts
      RUNMAT_FEA_ARTIFACT_ROOT: ${{ github.workspace }}/target/runmat-analysis-artifacts
      RUNMAT_THERMO_FIELD_ARTIFACT_ROOT: ${{ github.workspace }}/target/runmat-analysis-artifacts/thermo-fields
      RUNMAT_GEOMETRY_PREP_ARTIFACT_ROOT: ${{ github.workspace }}/target/runmat-prep-artifacts
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.90.0

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies (BLAS/LAPACK, ZMQ, OpenSSL)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libopenblas-dev liblapack-dev libssl-dev \
            libzmq3-dev pkg-config ca-certificates

      - name: Run FEA package tests
        run: cargo test -p runmat-analysis-core -p runmat-analysis-fea

      - name: Run FEA runtime contract tests
        run: cargo test -p runmat-runtime --test geometry_prep_conformance --test prep_solve_conformance --test operation_contracts

      - name: Run FEA benchmark conformance
        id: fea_benchmark_conformance
        run: cargo test -p runmat-runtime --test analysis

      - name: Verify filesystem artifact replay stability
        env:
          RUNMAT_ANALYSIS_ARTIFACT_STORE: filesystem
          RUNMAT_ANALYSIS_ARTIFACT_ROOT: target/runmat-analysis-store
          RUNMAT_ANALYSIS_ARTIFACT_MAX_RUNS: "0"
          RUNMAT_ANALYSIS_ARTIFACT_MAX_RUNS_PER_KIND: "0"
        run: cargo test -p runmat-runtime analysis::tests::analysis_results_by_run_id_filesystem_replay_is_stable

      - name: Mark artifact replay verification passed
        if: success()
        run: echo "RUNMAT_RELEASE_READINESS_ARTIFACT_REPLAY_OK=true" >> "$GITHUB_ENV"

      - name: Validate FEA conformance report keys
        run: python3 scripts/fea/governance/validate_fea_conformance_report.py

      - name: Enforce thermo summary presence on thermo-gated branches
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/')
        env:
          RUNMAT_VALIDATE_REQUIRE_THERMO_SUMMARY: "true"
          RUNMAT_VALIDATE_REQUIRE_THERMO_FIELD_SUMMARY: "true"
          RUNMAT_VALIDATE_REQUIRE_ELECTRO_SUMMARY: "true"
          RUNMAT_VALIDATE_REQUIRE_PLASTIC_SUMMARY: "true"
          RUNMAT_VALIDATE_REQUIRE_CONTACT_SUMMARY: "true"
        run: python3 scripts/fea/governance/validate_fea_conformance_report.py

      - name: Enforce non-default thermo signing key on release branches
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/')
        env:
          RUNMAT_THERMO_FIELD_SIGNING_KEY: ${{ secrets.RUNMAT_THERMO_FIELD_SIGNING_KEY }}
        run: |
          if [ -z "${RUNMAT_THERMO_FIELD_SIGNING_KEY}" ]; then
            echo "RUNMAT_THERMO_FIELD_SIGNING_KEY secret is required on release branches"
            exit 1
          fi
          if [ "${RUNMAT_THERMO_FIELD_SIGNING_KEY}" = "runmat-dev-thermo-signing-key" ]; then
            echo "default dev signing key is not allowed on release branches"
            exit 1
          fi

      - name: Verify thermo field artifact trust chain
        id: thermo_field_trust
        if: always() && steps.fea_benchmark_conformance.outcome == 'success'
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          artifacts = sorted(Path("target/runmat-analysis-artifacts/thermo-fields").glob("*.json"))
          report = {
              "schema_version": "thermo-field-trust-report/v1",
              "artifact_count": len(artifacts),
              "artifacts": [],
              "passed": bool(artifacts),
          }
          lines = ["## Thermo Field Trust Report", "", f"Artifacts: `{len(artifacts)}`"]
          if not artifacts:
              lines.append("")
              lines.append("No thermo field artifacts were found; compatibility verification is unverified.")
          for artifact in artifacts:
              proc = subprocess.run(
                  ["python3", "scripts/fea/thermo_artifacts/validate_thermo_field_artifact.py", str(artifact)],
                  capture_output=True,
                  text=True,
              )
              ok = proc.returncode == 0
              report["artifacts"].append(
                  {
                      "path": str(artifact),
                      "valid": ok,
                      "stdout": proc.stdout.strip(),
                      "stderr": proc.stderr.strip(),
                  }
              )
              lines.append(f"- `{artifact}`: {'ok' if ok else 'invalid'}")
              if not ok:
                  report["passed"] = False
          out_json = Path("target/runmat-analysis-artifacts/thermo_field_trust_report.json")
          out_md = Path("thermo-field-trust-report.md")
          out_json.parent.mkdir(parents=True, exist_ok=True)
          out_json.write_text(json.dumps(report, indent=2) + "\n")
          out_md.write_text("\n".join(lines) + "\n")
          print(out_md.read_text())
          if not report["passed"]:
              raise SystemExit(1)
          PY
          cat thermo-field-trust-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Mark artifact compatibility verification passed
        if: always() && steps.thermo_field_trust.outcome == 'success'
        run: echo "RUNMAT_RELEASE_READINESS_ARTIFACT_COMPAT_OK=true" >> "$GITHUB_ENV"

      - name: Test FEA script logic
        run: scripts/test-fea-scripts.sh

      - name: Validate prep calibration evidence
        run: python3 scripts/fea/prep_calibration/validate_prep_calibration_evidence.py

      - name: Generate prep calibration recommendations
        env:
          RUNMAT_RELEASE_READINESS_PREP_RETRAIN_TRIGGER_DRIFT: "0.1"
        run: python3 scripts/fea/prep_calibration/generate_prep_calibration_recommendations.py

      - name: Verify governance artifacts exist
        run: |
          test -f target/runmat-analysis-artifacts/prep_calibration_evidence_validation.json
          test -f target/runmat-analysis-artifacts/prep_calibration_recommendations.json

      - name: Validate prep calibration evidence promotion
        env:
          RUNMAT_PREP_CALIBRATION_EVIDENCE_CANDIDATE: scripts/fea/prep_calibration/evidence/prep_calibration_evidence.json
          RUNMAT_PREP_CALIBRATION_EVIDENCE_APPROVED: target/runmat-analysis-artifacts/prep_calibration_evidence_approved.json
          RUNMAT_PREP_CALIBRATION_RECOMMENDATIONS_INPUT: target/runmat-analysis-artifacts/prep_calibration_recommendations.json
          RUNMAT_PREP_CALIBRATION_PROMOTION_MAX_RECOMMENDATIONS: "64"
        run: python3 scripts/fea/prep_calibration/promote_prep_calibration_evidence.py

      - name: Verify promotion artifact exists
        run: test -f target/runmat-analysis-artifacts/prep_calibration_evidence_approved.json

      - name: Analyze nonlinear rolling trends
        if: always()
        env:
          RUNMAT_ANALYSIS_TREND_WINDOW: "8"
          RUNMAT_ANALYSIS_TREND_MAX_SLOWDOWN_RATIO: "1.25"
        run: |
          python3 scripts/fea/reporting/analyze_nonlinear_trends.py | tee nonlinear-trends.md
          cat nonlinear-trends.md >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize FEA conformance report
        if: always()
        run: |
          python3 scripts/fea/reporting/summarize_analysis_report.py | tee fea-conformance-summary.md
          cat fea-conformance-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize prep artifact SLO
        if: always()
        env:
          RUNMAT_PREP_SLO_WARN_ARTIFACT_COUNT: "64"
          RUNMAT_PREP_SLO_FAIL_ARTIFACT_COUNT: "128"
          RUNMAT_PREP_SLO_WARN_P95_AGE_SECONDS: "604800"
          RUNMAT_PREP_SLO_FAIL_P95_AGE_SECONDS: "1209600"
        run: |
          python3 scripts/fea/prep_calibration/summarize_prep_artifacts.py | tee prep-artifact-slo.md
          cat prep-artifact-slo.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate promotion threshold calibration
        if: always()
        run: python3 scripts/fea/governance/generate_promotion_threshold_calibration.py

      - name: Validate promotion threshold calibration
        if: always()
        env:
          RUNMAT_VALIDATE_PROMOTION_CALIBRATION_ENFORCE: "true"
          RUNMAT_VALIDATE_PROMOTION_CALIBRATION_REQUIRE_CADENCE: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/') }}
          RUNMAT_VALIDATE_PROMOTION_CALIBRATION_MIN_SOURCE_REPORTS: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/')) && '4' || '0' }}
          RUNMAT_PROMOTION_THRESHOLD_CALIBRATION_INPUT: target/runmat-analysis-artifacts/promotion_threshold_calibration.json
        run: python3 scripts/fea/governance/validate_promotion_threshold_calibration.py

      - name: Generate external reference benchmark artifact
        if: always()
        env:
          RUNMAT_EXTERNAL_REFERENCE_REPORT_PATH: target/runmat-analysis-artifacts/analysis_benchmark_report.json
          RUNMAT_EXTERNAL_REFERENCE_BASELINE_PATH: scripts/fea/reference_data/fea_l2_external_reference_baseline.json
          RUNMAT_EXTERNAL_REFERENCE_BENCHMARK_PATH: target/runmat-analysis-artifacts/external_reference_benchmark.json
        run: python3 scripts/fea/governance/generate_external_reference_benchmark.py

      - name: Validate external reference benchmark artifact
        if: always()
        env:
          RUNMAT_EXTERNAL_REFERENCE_BENCHMARK_PATH: target/runmat-analysis-artifacts/external_reference_benchmark.json
          RUNMAT_VALIDATE_EXTERNAL_REFERENCE_ENFORCE: "true"
          RUNMAT_VALIDATE_EXTERNAL_REFERENCE_REQUIRE_PASS: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/') }}
        run: python3 scripts/fea/governance/validate_external_reference_benchmark.py

      - name: Evaluate FEA release readiness
        if: always()
        env:
          RUNMAT_RELEASE_READINESS_MAX_SLOWDOWN_RATIO: "1.25"
          RUNMAT_RELEASE_READINESS_PREP_WARN_ARTIFACT_COUNT: "64"
          RUNMAT_RELEASE_READINESS_PREP_FAIL_ARTIFACT_COUNT: "128"
          RUNMAT_RELEASE_READINESS_PREP_WARN_P95_AGE_SECONDS: "604800"
          RUNMAT_RELEASE_READINESS_PREP_FAIL_P95_AGE_SECONDS: "1209600"
          RUNMAT_RELEASE_READINESS_PREP_MAX_REJECT_RATE: "0.25"
          RUNMAT_RELEASE_READINESS_PREP_REQUIRE_RECOMMENDATION_ARTIFACT: "true"
          RUNMAT_RELEASE_READINESS_PREP_CANDIDATE_MAX_AGE_DAYS: "14"
          RUNMAT_RELEASE_READINESS_REQUIRE_PROMOTION_READY: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/') }}
          RUNMAT_RELEASE_READINESS_REQUIRE_PROMOTION_CALIBRATION: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/') }}
          RUNMAT_RELEASE_READINESS_PROMOTION_CALIBRATION: target/runmat-analysis-artifacts/promotion_threshold_calibration.json
          RUNMAT_PREP_CALIBRATION_RECOMMENDATIONS_INPUT: target/runmat-analysis-artifacts/prep_calibration_recommendations.json
          RUNMAT_THERMO_FIELD_SIGNING_KEY: ${{ secrets.RUNMAT_THERMO_FIELD_SIGNING_KEY }}
        run: |
          python3 scripts/fea/governance/release_readiness_fea.py | tee fea-release-readiness.md
          cat fea-release-readiness.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate threshold ratchet report
        if: always()
        run: |
          python3 scripts/fea/governance/generate_threshold_ratchet_report.py | tee threshold-ratchet.md
          cat threshold-ratchet.md >> "$GITHUB_STEP_SUMMARY"

      - name: Validate threshold ratchet report
        if: always()
        env:
          RUNMAT_VALIDATE_THRESHOLD_RATCHET_ENFORCE: "true"
          RUNMAT_VALIDATE_THRESHOLD_RATCHET_REQUIRE_OBSERVED: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/') }}
        run: python3 scripts/fea/governance/validate_threshold_ratchet_report.py

      - name: Summarize governance artifacts
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          rec_path = Path("target/runmat-analysis-artifacts/prep_calibration_recommendations.json")
          ready_path = Path("target/runmat-analysis-artifacts/fea_release_readiness.json")
          ratchet_path = Path("target/runmat-analysis-artifacts/threshold_ratchet_report.json")
          promotion_calib_path = Path("target/runmat-analysis-artifacts/promotion_threshold_calibration.json")
          external_ref_path = Path("target/runmat-analysis-artifacts/external_reference_benchmark.json")
          lines = ["## Tier 7.5 Governance", ""]
          if rec_path.exists():
              rec = json.loads(rec_path.read_text())
              lines.append(f"- Recommendation count: {rec.get('recommendation_count', 0)}")
          else:
              lines.append("- Recommendation artifact: missing")
          if ready_path.exists():
              ready = json.loads(ready_path.read_text())
              lines.append(f"- Governance profile: {ready.get('governance_profile', 'unknown')}")
              lines.append(f"- Readiness verdict: {ready.get('verdict', 'unknown')}")
              thermo_enabled_rate = ready.get('thermo_coupling_enabled_rate')
              thermo_max_transient = ready.get('thermo_max_transient_severity')
              thermo_max_nonlinear = ready.get('thermo_max_nonlinear_severity')
              thermo_max_spread = ready.get('thermo_max_spread_ratio')
              thermo_spread_threshold = ready.get('thermo_max_spread_ratio_threshold')
              thermo_max_heterogeneity = ready.get('thermo_max_heterogeneity_index')
              thermo_min_field_coverage = ready.get('thermo_min_field_coverage_ratio')
              thermo_field_coverage_threshold = ready.get('thermo_min_field_coverage_ratio_threshold')
              thermo_max_field_extrapolation = ready.get('thermo_max_field_extrapolation_ratio')
