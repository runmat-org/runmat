<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#c8d0dc" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#b0bcc8" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#e8ecf4"/>
      <stop offset="100%" stop-color="#e0e6f0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- stacked sine waves at different frequencies -->
  <path d="M0 60 Q50 30 100 60 T200 60 T300 60 T400 60" fill="none" stroke="#2a3a6a" stroke-width="1" opacity="0.12"/>
  <path d="M0 90 Q25 70 50 90 T100 90 T150 90 T200 90 T250 90 T300 90 T350 90 T400 90" fill="none" stroke="#2a3a6a" stroke-width="0.8" opacity="0.1"/>
  <path d="M0 120 Q15 108 30 120 T60 120 T90 120 T120 120 T150 120 T180 120 T210 120 T240 120 T270 120 T300 120 T330 120 T360 120 T390 120" fill="none" stroke="#2a3a6a" stroke-width="0.6" opacity="0.08"/>
  <!-- envelope -->
  <path d="M0 40 C100 10 200 10 300 25 C350 35 380 50 400 55" fill="none" stroke="#2a3a6a" stroke-width="0.8" opacity="0.08" stroke-dasharray="4 4"/>
  <path d="M0 80 C100 110 200 110 300 95 C350 85 380 70 400 65" fill="none" stroke="#2a3a6a" stroke-width="0.8" opacity="0.08" stroke-dasharray="4 4"/>
  <!-- horizontal reference lines -->
  <line x1="0" y1="150" x2="400" y2="150" stroke="#2a3a6a" stroke-width="0.4" opacity="0.06"/>
  <line x1="0" y1="170" x2="400" y2="170" stroke="#2a3a6a" stroke-width="0.4" opacity="0.06"/>
  <line x1="0" y1="190" x2="400" y2="190" stroke="#2a3a6a" stroke-width="0.4" opacity="0.06"/>
  <!-- cross markers -->
  <g stroke="#5a6a8a" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="195" x2="53" y2="195"/><line x1="50" y1="192" x2="50" y2="198"/>
    <line x1="197" y1="195" x2="203" y2="195"/><line x1="200" y1="192" x2="200" y2="198"/>
    <line x1="347" y1="195" x2="353" y2="195"/><line x1="350" y1="192" x2="350" y2="198"/>
  </g>
</svg>
