<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#e4c4cc" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#d4a4b0" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="fade" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faedf0"/>
      <stop offset="100%" stop-color="#f4e4e8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- spiral / parametric curve -->
  <path d="M200 110 C210 90 230 80 240 100 C250 120 240 140 220 140 C200 140 185 125 185 105 C185 85 200 70 220 68 C245 66 265 82 268 105 C271 130 255 155 228 158 C198 161 175 142 172 112 C169 80 190 58 222 55" fill="none" stroke="#c4506a" stroke-width="1.5" opacity="0.25"/>
  <!-- inner spiral -->
  <path d="M200 110 C205 100 215 95 220 105 C225 115 218 122 210 120 C202 118 198 110 203 103" fill="none" stroke="#c4506a" stroke-width="1" opacity="0.35"/>
  <!-- dimension annotations -->
  <line x1="60" y1="50" x2="60" y2="180" stroke="#c4506a" stroke-width="0.6" opacity="0.15"/>
  <line x1="56" y1="50" x2="64" y2="50" stroke="#c4506a" stroke-width="0.6" opacity="0.2"/>
  <line x1="56" y1="180" x2="64" y2="180" stroke="#c4506a" stroke-width="0.6" opacity="0.2"/>
  <text x="55" y="118" font-family="monospace" font-size="6" fill="#c4506a" opacity="0.2" text-anchor="end" transform="rotate(-90 55 118)">130px</text>
  <!-- angle arc -->
  <path d="M320 160 L360 160" stroke="#c4506a" stroke-width="0.6" opacity="0.2"/>
  <path d="M320 160 L345 135" stroke="#c4506a" stroke-width="0.6" opacity="0.2"/>
  <path d="M332 160 A12 12 0 0 0 337 151" fill="none" stroke="#c4506a" stroke-width="0.5" opacity="0.25"/>
  <text x="340" y="157" font-family="monospace" font-size="6" fill="#c4506a" opacity="0.2">32°</text>
  <!-- parametric dots along curve -->
  <circle cx="240" cy="100" r="2" fill="#c4506a" opacity="0.2"/>
  <circle cx="220" cy="140" r="2" fill="#c4506a" opacity="0.2"/>
  <circle cx="185" cy="105" r="2" fill="#c4506a" opacity="0.2"/>
  <circle cx="220" cy="68" r="2" fill="#c4506a" opacity="0.2"/>
  <circle cx="268" cy="105" r="2" fill="#c4506a" opacity="0.2"/>
  <!-- cross markers -->
  <g stroke="#b87080" stroke-width="0.5" opacity="0.35">
    <line x1="97" y1="175" x2="103" y2="175"/><line x1="100" y1="172" x2="100" y2="178"/>
    <line x1="347" y1="75" x2="353" y2="75"/><line x1="350" y1="72" x2="350" y2="78"/>
  </g>
</svg>
