<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#d8c8c8" stroke-width="0.35"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#c8b0b0" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#f6eeee"/>
      <stop offset="100%" stop-color="#f0e6e8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- Lissajous figure -->
  <path d="M200 30 C260 30 320 65 340 110 C360 155 340 190 280 190 C220 190 160 155 140 110 C120 65 140 30 200 30" fill="none" stroke="#c44060" stroke-width="1.5" opacity="0.2"/>
  <!-- figure-8 variation -->
  <path d="M200 110 C220 60 280 40 310 70 C340 100 310 140 280 150 C250 160 220 140 200 110 C180 80 150 60 120 70 C90 80 60 120 90 150 C120 180 180 160 200 110" fill="none" stroke="#c44060" stroke-width="1" opacity="0.15"/>
  <!-- small orbital -->
  <ellipse cx="200" cy="110" rx="25" ry="40" fill="none" stroke="#c44060" stroke-width="0.8" opacity="0.12" transform="rotate(30 200 110)"/>
  <ellipse cx="200" cy="110" rx="25" ry="40" fill="none" stroke="#c44060" stroke-width="0.8" opacity="0.12" transform="rotate(-30 200 110)"/>
  <!-- focal points -->
  <circle cx="200" cy="110" r="2.5" fill="#c44060" opacity="0.15"/>
  <circle cx="310" cy="70" r="1.5" fill="#c44060" opacity="0.1"/>
  <circle cx="90" cy="150" r="1.5" fill="#c44060" opacity="0.1"/>
  <!-- cross markers -->
  <g stroke="#b87080" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="45" x2="53" y2="45"/><line x1="50" y1="42" x2="50" y2="48"/>
    <line x1="347" y1="195" x2="353" y2="195"/><line x1="350" y1="192" x2="350" y2="198"/>
  </g>
</svg>
