<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#d8c8d4" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#c4b0c0" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f2ecf0"/>
      <stop offset="100%" stop-color="#ece4ea"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- radial starburst lines from off-center point -->
  <g stroke="#804070" stroke-width="0.5" opacity="0.1">
    <line x1="280" y1="80" x2="20" y2="30"/>
    <line x1="280" y1="80" x2="10" y2="80"/>
    <line x1="280" y1="80" x2="20" y2="140"/>
    <line x1="280" y1="80" x2="50" y2="200"/>
    <line x1="280" y1="80" x2="120" y2="210"/>
    <line x1="280" y1="80" x2="200" y2="210"/>
    <line x1="280" y1="80" x2="300" y2="210"/>
    <line x1="280" y1="80" x2="380" y2="200"/>
    <line x1="280" y1="80" x2="400" y2="140"/>
    <line x1="280" y1="80" x2="400" y2="60"/>
    <line x1="280" y1="80" x2="380" y2="10"/>
    <line x1="280" y1="80" x2="300" y2="0"/>
    <line x1="280" y1="80" x2="200" y2="0"/>
    <line x1="280" y1="80" x2="120" y2="0"/>
  </g>
  <!-- concentric arcs around the point -->
  <path d="M230 30 A60 60 0 0 1 330 130" fill="none" stroke="#804070" stroke-width="0.6" opacity="0.1"/>
  <path d="M210 10 A80 80 0 0 1 360 150" fill="none" stroke="#804070" stroke-width="0.6" opacity="0.08"/>
  <!-- center point -->
  <circle cx="280" cy="80" r="3" fill="#804070" opacity="0.12"/>
  <circle cx="280" cy="80" r="8" fill="none" stroke="#804070" stroke-width="0.6" opacity="0.1"/>
  <!-- cross markers -->
  <g stroke="#9a6090" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="195" x2="53" y2="195"/><line x1="50" y1="192" x2="50" y2="198"/>
    <line x1="47" y1="25" x2="53" y2="25"/><line x1="50" y1="22" x2="50" y2="28"/>
  </g>
</svg>
