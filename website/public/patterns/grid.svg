<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#d6d6d4" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#c0c0be" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5f2"/>
      <stop offset="100%" stop-color="#eeedea"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- FFT / frequency spectrum -->
  <rect x="50" y="150" width="3" height="20" fill="#666" opacity="0.15" rx="0.5"/>
  <rect x="58" y="135" width="3" height="35" fill="#666" opacity="0.18" rx="0.5"/>
  <rect x="66" y="125" width="3" height="45" fill="#666" opacity="0.2" rx="0.5"/>
  <rect x="74" y="100" width="3" height="70" fill="#666" opacity="0.25" rx="0.5"/>
  <rect x="82" y="80" width="3" height="90" fill="#666" opacity="0.3" rx="0.5"/>
  <rect x="90" y="60" width="3" height="110" fill="#666" opacity="0.35" rx="0.5"/>
  <rect x="98" y="75" width="3" height="95" fill="#666" opacity="0.28" rx="0.5"/>
  <rect x="106" y="95" width="3" height="75" fill="#666" opacity="0.22" rx="0.5"/>
  <rect x="114" y="115" width="3" height="55" fill="#666" opacity="0.18" rx="0.5"/>
  <rect x="122" y="130" width="3" height="40" fill="#666" opacity="0.15" rx="0.5"/>
  <rect x="130" y="140" width="3" height="30" fill="#666" opacity="0.12" rx="0.5"/>
  <rect x="138" y="148" width="3" height="22" fill="#666" opacity="0.1" rx="0.5"/>
  <rect x="146" y="152" width="3" height="18" fill="#666" opacity="0.08" rx="0.5"/>
  <rect x="154" y="155" width="3" height="15" fill="#666" opacity="0.07" rx="0.5"/>
  <!-- frequency axis -->
  <line x1="45" y1="172" x2="165" y2="172" stroke="#666" stroke-width="0.6" opacity="0.2"/>
  <text x="100" y="185" font-family="monospace" font-size="6" fill="#666" opacity="0.18" text-anchor="middle">freq (Hz)</text>
  <!-- equation fragment -->
  <text x="240" y="85" font-family="serif" font-size="11" fill="#666" opacity="0.15">F(ω) = ∫ f(t) e</text>
  <text x="338" y="80" font-family="serif" font-size="7" fill="#666" opacity="0.15">−iωt</text>
  <text x="360" y="85" font-family="serif" font-size="11" fill="#666" opacity="0.15">dt</text>
  <!-- integration limits -->
  <text x="265" y="100" font-family="serif" font-size="7" fill="#666" opacity="0.12">−∞</text>
  <text x="265" y="76" font-family="serif" font-size="7" fill="#666" opacity="0.12">+∞</text>
  <!-- signal snippet -->
  <path d="M230 140 Q238 120 246 140 Q254 160 262 140 Q270 120 278 140 Q286 160 294 140 Q302 120 310 140 Q318 160 326 140" fill="none" stroke="#666" stroke-width="0.8" opacity="0.18"/>
  <!-- cross markers -->
  <g stroke="#999" stroke-width="0.5" opacity="0.3">
    <line x1="197" y1="45" x2="203" y2="45"/><line x1="200" y1="42" x2="200" y2="48"/>
    <line x1="347" y1="45" x2="353" y2="45"/><line x1="350" y1="42" x2="350" y2="48"/>
    <line x1="47" y1="45" x2="53" y2="45"/><line x1="50" y1="42" x2="50" y2="48"/>
  </g>
</svg>
