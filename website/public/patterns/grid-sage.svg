<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#c8d4c4" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#b0c4a8" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#eff4ec"/>
      <stop offset="100%" stop-color="#e6ede2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- tangent circles arrangement -->
  <circle cx="130" cy="90" r="40" fill="none" stroke="#4a7a40" stroke-width="0.8" opacity="0.12"/>
  <circle cx="200" cy="60" r="35" fill="none" stroke="#4a7a40" stroke-width="0.8" opacity="0.14"/>
  <circle cx="260" cy="100" r="45" fill="none" stroke="#4a7a40" stroke-width="0.8" opacity="0.1"/>
  <circle cx="180" cy="145" r="38" fill="none" stroke="#4a7a40" stroke-width="0.8" opacity="0.12"/>
  <circle cx="300" cy="160" r="30" fill="none" stroke="#4a7a40" stroke-width="0.8" opacity="0.1"/>
  <!-- tangent points -->
  <circle cx="166" cy="72" r="1.5" fill="#4a7a40" opacity="0.15"/>
  <circle cx="228" cy="82" r="1.5" fill="#4a7a40" opacity="0.15"/>
  <circle cx="155" cy="120" r="1.5" fill="#4a7a40" opacity="0.15"/>
  <circle cx="210" cy="114" r="1.5" fill="#4a7a40" opacity="0.12"/>
  <circle cx="276" cy="142" r="1.5" fill="#4a7a40" opacity="0.12"/>
  <!-- connecting tangent lines -->
  <line x1="166" y1="72" x2="228" y2="82" stroke="#4a7a40" stroke-width="0.4" opacity="0.08" stroke-dasharray="2 3"/>
  <line x1="155" y1="120" x2="210" y2="114" stroke="#4a7a40" stroke-width="0.4" opacity="0.08" stroke-dasharray="2 3"/>
  <!-- cross markers -->
  <g stroke="#6a9a60" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="25" x2="53" y2="25"/><line x1="50" y1="22" x2="50" y2="28"/>
    <line x1="347" y1="195" x2="353" y2="195"/><line x1="350" y1="192" x2="350" y2="198"/>
  </g>
</svg>
