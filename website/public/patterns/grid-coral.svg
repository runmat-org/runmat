<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#e4ccc0" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#d8b8a8" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f0ec"/>
      <stop offset="100%" stop-color="#f2e8e2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- overlapping rounded rectangles at angles -->
  <rect x="80" y="50" width="120" height="80" rx="8" fill="none" stroke="#c06040" stroke-width="0.8" opacity="0.12" transform="rotate(-8 140 90)"/>
  <rect x="100" y="60" width="120" height="80" rx="8" fill="none" stroke="#c06040" stroke-width="0.8" opacity="0.14" transform="rotate(5 160 100)"/>
  <rect x="90" y="55" width="120" height="80" rx="8" fill="none" stroke="#c06040" stroke-width="1" opacity="0.1" transform="rotate(-2 150 95)"/>
  <!-- second cluster -->
  <rect x="230" y="90" width="100" height="70" rx="6" fill="none" stroke="#c06040" stroke-width="0.8" opacity="0.1" transform="rotate(12 280 125)"/>
  <rect x="240" y="100" width="100" height="70" rx="6" fill="none" stroke="#c06040" stroke-width="0.8" opacity="0.12" transform="rotate(-6 290 135)"/>
  <!-- corner pins -->
  <circle cx="80" cy="50" r="1.5" fill="#c06040" opacity="0.1"/>
  <circle cx="200" cy="50" r="1.5" fill="#c06040" opacity="0.1"/>
  <circle cx="200" cy="130" r="1.5" fill="#c06040" opacity="0.1"/>
  <circle cx="80" cy="130" r="1.5" fill="#c06040" opacity="0.1"/>
  <!-- cross markers -->
  <g stroke="#c08060" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="195" x2="53" y2="195"/><line x1="50" y1="192" x2="50" y2="198"/>
    <line x1="347" y1="25" x2="353" y2="25"/><line x1="350" y1="22" x2="350" y2="28"/>
  </g>
</svg>
