<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#cdd2d8" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#b0b8c4" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#eef0f4"/>
      <stop offset="100%" stop-color="#e6e9ee"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- network / graph nodes -->
  <circle cx="120" cy="90" r="8" fill="none" stroke="#5a6a80" stroke-width="1.2" opacity="0.2"/>
  <circle cx="200" cy="60" r="6" fill="none" stroke="#5a6a80" stroke-width="1" opacity="0.2"/>
  <circle cx="280" cy="95" r="9" fill="none" stroke="#5a6a80" stroke-width="1.2" opacity="0.2"/>
  <circle cx="180" cy="150" r="7" fill="none" stroke="#5a6a80" stroke-width="1" opacity="0.2"/>
  <circle cx="310" cy="160" r="5" fill="none" stroke="#5a6a80" stroke-width="1" opacity="0.2"/>
  <circle cx="80" cy="160" r="6" fill="none" stroke="#5a6a80" stroke-width="1" opacity="0.2"/>
  <circle cx="340" cy="55" r="5" fill="none" stroke="#5a6a80" stroke-width="0.8" opacity="0.15"/>
  <!-- node fills -->
  <circle cx="120" cy="90" r="3" fill="#5a6a80" opacity="0.12"/>
  <circle cx="280" cy="95" r="3.5" fill="#5a6a80" opacity="0.12"/>
  <circle cx="180" cy="150" r="2.5" fill="#5a6a80" opacity="0.1"/>
  <!-- edges -->
  <line x1="128" y1="88" x2="194" y2="63" stroke="#5a6a80" stroke-width="0.8" opacity="0.15"/>
  <line x1="206" y1="62" x2="272" y2="92" stroke="#5a6a80" stroke-width="0.8" opacity="0.15"/>
  <line x1="118" y1="98" x2="178" y2="144" stroke="#5a6a80" stroke-width="0.8" opacity="0.15"/>
  <line x1="187" y1="150" x2="272" y2="100" stroke="#5a6a80" stroke-width="0.8" opacity="0.15"/>
  <line x1="187" y1="154" x2="305" y2="160" stroke="#5a6a80" stroke-width="0.6" opacity="0.12"/>
  <line x1="286" y1="100" x2="308" y2="155" stroke="#5a6a80" stroke-width="0.6" opacity="0.12"/>
  <line x1="86" y1="158" x2="115" y2="95" stroke="#5a6a80" stroke-width="0.6" opacity="0.12"/>
  <line x1="285" y1="90" x2="335" y2="58" stroke="#5a6a80" stroke-width="0.5" opacity="0.1"/>
  <!-- weight labels -->
  <text x="160" y="72" font-family="monospace" font-size="6" fill="#5a6a80" opacity="0.2">0.82</text>
  <text x="238" y="74" font-family="monospace" font-size="6" fill="#5a6a80" opacity="0.2">0.64</text>
  <text x="230" y="130" font-family="monospace" font-size="6" fill="#5a6a80" opacity="0.18">0.47</text>
  <!-- cross markers -->
  <g stroke="#7a8494" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="45" x2="53" y2="45"/><line x1="50" y1="42" x2="50" y2="48"/>
    <line x1="347" y1="195" x2="353" y2="195"/><line x1="350" y1="192" x2="350" y2="198"/>
  </g>
</svg>
