<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#d6d6d4" stroke-width="0.35"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#c0c0be" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f2f0"/>
      <stop offset="100%" stop-color="#eaeae6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- overlapping bezier curves -->
  <path d="M30 180 C100 30 200 30 370 180" fill="none" stroke="#555" stroke-width="1.2" opacity="0.15"/>
  <path d="M30 180 C130 60 270 60 370 180" fill="none" stroke="#555" stroke-width="1" opacity="0.12"/>
  <path d="M30 180 C80 100 150 50 250 50 C320 50 360 100 370 180" fill="none" stroke="#555" stroke-width="0.8" opacity="0.1"/>
  <!-- reflected -->
  <path d="M30 40 C100 190 200 190 370 40" fill="none" stroke="#555" stroke-width="1.2" opacity="0.15"/>
  <path d="M30 40 C130 160 270 160 370 40" fill="none" stroke="#555" stroke-width="1" opacity="0.12"/>
  <!-- intersection region fill -->
  <ellipse cx="200" cy="110" rx="40" ry="15" fill="#555" opacity="0.03"/>
  <!-- tangent dots at intersections -->
  <circle cx="115" cy="110" r="2" fill="#555" opacity="0.15"/>
  <circle cx="285" cy="110" r="2" fill="#555" opacity="0.15"/>
  <circle cx="200" cy="85" r="1.5" fill="#555" opacity="0.12"/>
  <circle cx="200" cy="135" r="1.5" fill="#555" opacity="0.12"/>
  <!-- cross markers -->
  <g stroke="#999" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="195" x2="53" y2="195"/><line x1="50" y1="192" x2="50" y2="198"/>
    <line x1="347" y1="25" x2="353" y2="25"/><line x1="350" y1="22" x2="350" y2="28"/>
    <line x1="197" y1="195" x2="203" y2="195"/><line x1="200" y1="192" x2="200" y2="198"/>
  </g>
</svg>
