<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#d0ddf0" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#b8cce8" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f0fb"/>
      <stop offset="100%" stop-color="#dce6f8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- intersecting arcs -->
  <path d="M80 200 A150 150 0 0 1 230 50" fill="none" stroke="#4F8CFF" stroke-width="1.5" opacity="0.2"/>
  <path d="M120 210 A130 130 0 0 1 250 80" fill="none" stroke="#4F8CFF" stroke-width="1" opacity="0.15"/>
  <path d="M320 10 A160 160 0 0 1 160 170" fill="none" stroke="#4F8CFF" stroke-width="1.5" opacity="0.18"/>
  <path d="M350 30 A140 140 0 0 1 210 170" fill="none" stroke="#4F8CFF" stroke-width="1" opacity="0.12"/>
  <!-- construction lines -->
  <line x1="30" y1="180" x2="280" y2="30" stroke="#4F8CFF" stroke-width="0.6" opacity="0.1"/>
  <line x1="370" y1="15" x2="120" y2="200" stroke="#4F8CFF" stroke-width="0.6" opacity="0.1"/>
  <!-- intersection dots -->
  <circle cx="195" cy="108" r="3" fill="#4F8CFF" opacity="0.2"/>
  <circle cx="172" cy="130" r="2" fill="#4F8CFF" opacity="0.15"/>
  <circle cx="220" cy="85" r="2.5" fill="#4F8CFF" opacity="0.18"/>
  <!-- cross markers -->
  <g stroke="#7aa3d4" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="45" x2="53" y2="45"/><line x1="50" y1="42" x2="50" y2="48"/>
    <line x1="347" y1="175" x2="353" y2="175"/><line x1="350" y1="172" x2="350" y2="178"/>
  </g>
</svg>
