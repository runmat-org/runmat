<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#c8d2dc" stroke-width="0.35"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#b0bcc8" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#edf0f5"/>
      <stop offset="100%" stop-color="#e4e8f0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- Penrose triangle construction lines -->
  <g fill="none" stroke="#4a6080" stroke-width="1" opacity="0.15">
    <!-- outer triangle -->
    <path d="M200 30 L330 180 L70 180 Z"/>
    <!-- inner triangle (inverted) -->
    <path d="M200 155 L135 80 L265 80 Z"/>
  </g>
  <!-- impossible connections -->
  <g fill="none" stroke="#4a6080" stroke-width="0.6" opacity="0.1">
    <line x1="200" y1="30" x2="135" y2="80"/>
    <line x1="330" y1="180" x2="265" y2="80"/>
    <line x1="70" y1="180" x2="200" y2="155"/>
    <line x1="200" y1="30" x2="265" y2="80"/>
    <line x1="330" y1="180" x2="200" y2="155"/>
    <line x1="70" y1="180" x2="135" y2="80"/>
  </g>
  <!-- subdivision dots -->
  <g fill="#4a6080" opacity="0.1">
    <circle cx="200" cy="30" r="2.5"/>
    <circle cx="330" cy="180" r="2.5"/>
    <circle cx="70" cy="180" r="2.5"/>
    <circle cx="135" cy="80" r="2"/>
    <circle cx="265" cy="80" r="2"/>
    <circle cx="200" cy="155" r="2"/>
    <circle cx="167" cy="55" r="1.5"/>
    <circle cx="233" cy="55" r="1.5"/>
    <circle cx="298" cy="130" r="1.5"/>
    <circle cx="265" cy="180" r="1.5"/>
    <circle cx="135" cy="180" r="1.5"/>
    <circle cx="102" cy="130" r="1.5"/>
  </g>
  <!-- cross markers -->
  <g stroke="#7a8494" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="195" x2="53" y2="195"/><line x1="50" y1="192" x2="50" y2="198"/>
    <line x1="347" y1="195" x2="353" y2="195"/><line x1="350" y1="192" x2="350" y2="198"/>
    <line x1="347" y1="25" x2="353" y2="25"/><line x1="350" y1="22" x2="350" y2="28"/>
  </g>
</svg>
