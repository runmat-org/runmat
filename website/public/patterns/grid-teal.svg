<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#c0dcd8" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#a0ccc4" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4f2"/>
      <stop offset="100%" stop-color="#ddf0ec"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- interference circles -->
  <circle cx="160" cy="110" r="90" fill="none" stroke="#2a8a7a" stroke-width="0.5" opacity="0.1"/>
  <circle cx="160" cy="110" r="70" fill="none" stroke="#2a8a7a" stroke-width="0.5" opacity="0.12"/>
  <circle cx="160" cy="110" r="50" fill="none" stroke="#2a8a7a" stroke-width="0.5" opacity="0.14"/>
  <circle cx="160" cy="110" r="30" fill="none" stroke="#2a8a7a" stroke-width="0.6" opacity="0.16"/>
  <circle cx="240" cy="110" r="90" fill="none" stroke="#2a8a7a" stroke-width="0.5" opacity="0.1"/>
  <circle cx="240" cy="110" r="70" fill="none" stroke="#2a8a7a" stroke-width="0.5" opacity="0.12"/>
  <circle cx="240" cy="110" r="50" fill="none" stroke="#2a8a7a" stroke-width="0.5" opacity="0.14"/>
  <circle cx="240" cy="110" r="30" fill="none" stroke="#2a8a7a" stroke-width="0.6" opacity="0.16"/>
  <!-- center points -->
  <circle cx="160" cy="110" r="2" fill="#2a8a7a" opacity="0.15"/>
  <circle cx="240" cy="110" r="2" fill="#2a8a7a" opacity="0.15"/>
  <!-- cross markers -->
  <g stroke="#5aaa9a" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="25" x2="53" y2="25"/><line x1="50" y1="22" x2="50" y2="28"/>
    <line x1="347" y1="195" x2="353" y2="195"/><line x1="350" y1="192" x2="350" y2="198"/>
  </g>
</svg>
