<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#d0ddf0" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#b8cce8" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0.3" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#eaf0fa"/>
      <stop offset="100%" stop-color="#e0eaf6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- golden spiral construction -->
  <path d="M200 110 A30 30 0 0 1 230 80" fill="none" stroke="#4F8CFF" stroke-width="1.2" opacity="0.2"/>
  <path d="M230 80 A50 50 0 0 1 280 130" fill="none" stroke="#4F8CFF" stroke-width="1.2" opacity="0.18"/>
  <path d="M280 130 A80 80 0 0 1 200 210" fill="none" stroke="#4F8CFF" stroke-width="1.2" opacity="0.15"/>
  <path d="M200 210 A130 130 0 0 1 70 80" fill="none" stroke="#4F8CFF" stroke-width="1" opacity="0.12"/>
  <!-- golden rectangles -->
  <rect x="170" y="80" width="60" height="60" fill="none" stroke="#4F8CFF" stroke-width="0.6" opacity="0.12"/>
  <rect x="230" y="80" width="100" height="100" fill="none" stroke="#4F8CFF" stroke-width="0.6" opacity="0.1"/>
  <rect x="70" y="80" width="100" height="160" fill="none" stroke="#4F8CFF" stroke-width="0.5" opacity="0.08"/>
  <!-- diagonal construction -->
  <line x1="170" y1="140" x2="230" y2="80" stroke="#4F8CFF" stroke-width="0.4" opacity="0.1" stroke-dasharray="3 3"/>
  <line x1="230" y1="180" x2="330" y2="80" stroke="#4F8CFF" stroke-width="0.4" opacity="0.08" stroke-dasharray="3 3"/>
  <!-- cross markers -->
  <g stroke="#7aa3d4" stroke-width="0.5" opacity="0.3">
    <line x1="347" y1="45" x2="353" y2="45"/><line x1="350" y1="42" x2="350" y2="48"/>
    <line x1="47" y1="195" x2="53" y2="195"/><line x1="50" y1="192" x2="50" y2="198"/>
  </g>
</svg>
