<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <pattern id="fine" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0V10H0" fill="none" stroke="#d0c4e8" stroke-width="0.4"/>
    </pattern>
    <pattern id="major" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#fine)"/>
      <path d="M50 0V50H0" fill="none" stroke="#b8a6d8" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="fade" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0ecf6"/>
      <stop offset="100%" stop-color="#ece4f4"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#fade)"/>
  <rect width="400" height="220" fill="url(#major)"/>
  <!-- isometric cube wireframe -->
  <g stroke="#7a5ab8" opacity="0.18" fill="none" stroke-width="0.8">
    <!-- cube 1 -->
    <path d="M100 130 L130 115 L160 130 L130 145 Z"/>
    <path d="M100 130 L100 100 L130 85 L130 115"/>
    <path d="M130 85 L160 100 L160 130"/>
    <!-- cube 2 -->
    <path d="M160 130 L190 115 L220 130 L190 145 Z"/>
    <path d="M160 130 L160 100 L190 85 L190 115"/>
    <path d="M190 85 L220 100 L220 130"/>
    <!-- stacked -->
    <path d="M130 85 L130 55 L160 40 L160 70"/>
    <path d="M130 55 L100 70 L100 100"/>
    <path d="M160 40 L190 55 L190 85"/>
  </g>
  <!-- floating triangles -->
  <path d="M280 60 L310 110 L250 110 Z" fill="none" stroke="#7a5ab8" stroke-width="1" opacity="0.12"/>
  <path d="M295 75 L315 110 L275 110 Z" fill="none" stroke="#7a5ab8" stroke-width="0.8" opacity="0.15"/>
  <!-- scattered perpendicular marks -->
  <g stroke="#7a5ab8" stroke-width="0.6" opacity="0.12">
    <line x1="310" y1="150" x2="340" y2="150"/>
    <line x1="310" y1="150" x2="310" y2="175"/>
    <path d="M310 158 L318 158 L318 150" fill="none"/>
  </g>
  <!-- cross markers -->
  <g stroke="#8a70b8" stroke-width="0.5" opacity="0.3">
    <line x1="47" y1="45" x2="53" y2="45"/><line x1="50" y1="42" x2="50" y2="48"/>
    <line x1="347" y1="195" x2="353" y2="195"/><line x1="350" y1="192" x2="350" y2="198"/>
    <line x1="347" y1="45" x2="353" y2="45"/><line x1="350" y1="42" x2="350" y2="48"/>
  </g>
</svg>
