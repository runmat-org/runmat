[package]
name = "runmat-vm"
version = "0.3.2"
edition = "2021"
authors = ["Dystr Team"]
license-file = "../../LICENSE.md"
description = "RunMat virtual machine and bytecode interpreter"
homepage = "https://runmat.com"
repository = "https://github.com/runmat-org/runmat"

[dependencies]
runmat-ignition = { workspace = true }

[features]
default = ["native-accel", "plot-core"]
test-classes = ["runmat-ignition/test-classes"]
native-accel = ["runmat-ignition/native-accel"]
plot-core = ["runmat-ignition/plot-core"]
