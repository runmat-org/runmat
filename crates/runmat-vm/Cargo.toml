[package]
name = "runmat-vm"
version = "0.4.0"
edition = "2021"
authors = ["Dystr Team"]
license-file = "../../LICENSE.md"
description = "RunMat virtual machine and bytecode interpreter"
homepage = "https://runmat.com"
repository = "https://github.com/runmat-org/runmat"

[dependencies]
runmat-builtins = { workspace = true }
runmat-runtime = { workspace = true, optional = true }
runmat-accelerate = { workspace = true, optional = true }
runmat-accelerate-api = { workspace = true, optional = true }
runmat-gc = { workspace = true }
runmat-hir = { workspace = true }
runmat-parser = { workspace = true }
runmat-thread-local = { workspace = true }
runmat-time = { workspace = true }
once_cell = { workspace = true }
miette = { workspace = true }
log = { workspace = true }
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }

[features]
default = ["native-accel", "plot-core"]
test-classes = ["runmat-runtime/test-classes"]
native-accel = ["runmat-accelerate", "runmat-accelerate-api"]
plot-core = ["runmat-runtime/plot-core"]

[dev-dependencies]
futures = "0.3"
anyhow = "1"
